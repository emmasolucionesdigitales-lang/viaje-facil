<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ViajeFácil 🚗</title>
<meta name="theme-color" content="#2b6cb0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ViajeFácil"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}
input:focus{outline:2px solid #4299e1}
.leaflet-container{font-family:system-ui!important}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── TIPOS DE PARADA ────────────────────────────────────────
const TIPOS = {
  origen:    {icon:"A",  color:"#38a169", label:"Origen",    emoji:"📍"},
  destino:   {icon:"B",  color:"#e53e3e", label:"Destino",   emoji:"🏁"},
  comida:    {icon:"🍽", color:"#ed8936", label:"Comer",     emoji:"🍽️"},
  descanso:  {icon:"☕", color:"#3182ce", label:"Descanso",  emoji:"☕"},
  mirador:   {icon:"🏔", color:"#805ad5", label:"Mirador",   emoji:"🏔️"},
  turistico: {icon:"★",  color:"#0bc5ea", label:"Turístico", emoji:"⭐"},
  dormir:    {icon:"🌙", color:"#2d3748", label:"Dormir",    emoji:"🏕️"},
};

const CATS = {
  nafta:{icon:"⛽",label:"Nafta",color:"#e53e3e"},
  comida:{icon:"🍔",label:"Comida",color:"#ed8936"},
  hospedaje:{icon:"🏨",label:"Hospedaje",color:"#3182ce"},
  actividades:{icon:"🎡",label:"Actividades",color:"#38a169"},
  otro:{icon:"📦",label:"Otro",color:"#718096"},
};

const TABS = [
  {id:"inicio",  icon:"🏠",label:"Inicio",  color:"#2b6cb0"},
  {id:"opciones",icon:"🗂️",label:"Opciones",color:"#38a169"},
  {id:"mapa",    icon:"🗺️",label:"Mapa",    color:"#e53e3e"},
  {id:"gastos",  icon:"💰",label:"Gastos",  color:"#d69e2e"},
  {id:"config",  icon:"⚙️",label:"Config",  color:"#4a5568"},
];

const fmtM  = n => "$"+(Math.round(n)||0).toLocaleString("es-AR");
const fmtDt = s => { try{ return new Date(s).toLocaleString("es-AR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }catch{ return "—";} };

// Calcular días entre dos fechas
function calcDias(f1, f2) {
  const d1=new Date(f1), d2=new Date(f2);
  return Math.max(1, Math.round((d2-d1)/(1000*60*60*24))+1);
}

// Ruta real por OSRM
async function getOSRM(pts) {
  if(pts.length<2) return null;
  try {
    const coords = pts.map(p=>`${p.lng},${p.lat}`).join(";");
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const d = await r.json();
    if(d.code==="Ok") return d.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);
  } catch(e){}
  return null;
}

// ── ESTILOS ────────────────────────────────────────────────
const S = {
  app:  {maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f0f4f8",position:"relative",paddingBottom:72},
  hdr:  c => ({background:c,padding:"16px 20px 14px",color:"white"}),
  card: {background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"},
  btn:  (c,l) => ({background:l?`${c}18`:c,color:l?c:"white",border:l?`1.5px solid ${c}`:"none",borderRadius:10,padding:"11px 16px",fontWeight:"bold",fontSize:14,cursor:"pointer",width:"100%",marginTop:8,display:"block"}),
  inp:  {width:"100%",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"10px 13px",fontSize:14,background:"white",marginBottom:4},
  lbl:  {fontSize:12,color:"#718096",marginBottom:5,display:"block",marginTop:12},
  ovr:  {position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"},
  sht:  {background:"white",borderRadius:"18px 18px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:430,maxHeight:"90vh",overflowY:"auto"},
  nav:  {position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:500},
  nvb:  (a,c) => ({flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:a?c:"#a0aec0"}),
  bdg:  c => ({background:`${c}18`,color:c,borderRadius:20,padding:"3px 9px",fontSize:12,fontWeight:"bold",display:"inline-block"}),
  row:  {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f4f4f4"},
};

// ── MAPA LEAFLET ───────────────────────────────────────────
let _map=null, _mlayer=null, _rlayer=null, _gpsM=null;

function MapaLeaflet({paradas, posGPS, loadingRuta}) {
  const ref = useRef(null);

  useEffect(()=>{
    if(!ref.current||_map) return;
    _map = L.map(ref.current,{zoomControl:true}).setView([-27,-65],6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {attribution:"© OpenStreetMap",maxZoom:19}).addTo(_map);
  },[]);

  useEffect(()=>{ setTimeout(()=>{ if(_map) _map.invalidateSize(); },200); },[]);

  useEffect(()=>{
    if(!_map) return;
    if(_mlayer){_map.removeLayer(_mlayer);_mlayer=null;}
    if(_rlayer){_map.removeLayer(_rlayer);_rlayer=null;}
    if(!paradas||!paradas.length) return;

    _mlayer = L.layerGroup().addTo(_map);
    const bounds=[];

    // Marcadores
    paradas.forEach(p=>{
      if(!p.lat||!p.lng) return;
      const t = TIPOS[p.tipo]||TIPOS.turistico;
      const ico = L.divIcon({
        html:`<div style="background:${t.color};color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;box-shadow:0 3px 10px rgba(0,0,0,0.4);border:2px solid white;">${t.icon}</div>`,
        className:"",iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]
      });
      L.marker([p.lat,p.lng],{icon:ico})
        .bindPopup(`
          <div style="min-width:200px;font-family:system-ui">
            <div style="background:${t.color};color:white;padding:8px 10px;margin:-13px -19px 10px;border-radius:4px 4px 0 0;font-weight:bold">${t.emoji} ${p.nombre}</div>
            <div style="font-size:12px;color:#555;margin-bottom:4px">${t.label}${p.horaLlegada?" · 🕐 "+p.horaLlegada:""}</div>
            ${p.descripcion?`<div style="font-size:13px;color:#333">${p.descripcion}</div>`:""}
            ${p.duracion?`<div style="font-size:12px;color:#888;margin-top:4px">⏱ ${p.duracion}</div>`:""}
          </div>`)
        .addTo(_mlayer);
      bounds.push([p.lat,p.lng]);
    });

    // Ruta por OSRM
    const pts = paradas.filter(p=>p.lat&&p.lng);
    if(pts.length>=2){
      getOSRM(pts).then(ruta=>{
        if(!_map) return;
        if(_rlayer){_map.removeLayer(_rlayer);_rlayer=null;}
        if(ruta){
          _rlayer = L.polyline(ruta,{color:"#2b6cb0",weight:5,opacity:.75}).addTo(_map);
        } else {
          _rlayer = L.polyline(pts.map(p=>[p.lat,p.lng]),{color:"#2b6cb0",weight:4,opacity:.5,dashArray:"10,6"}).addTo(_map);
        }
      });
    }
    if(bounds.length) _map.fitBounds(bounds,{padding:[50,50],maxZoom:12});
  },[paradas]);

  useEffect(()=>{
    if(!_map) return;
    if(_gpsM){_map.removeLayer(_gpsM);_gpsM=null;}
    if(!posGPS) return;
    const ico=L.divIcon({
      html:`<div style="background:#805ad5;border:3px solid white;border-radius:50%;width:22px;height:22px;box-shadow:0 2px 8px rgba(128,90,213,.7);animation:pulse 2s infinite"></div>`,
      className:"",iconSize:[22,22],iconAnchor:[11,11]
    });
    _gpsM=L.marker([posGPS.lat,posGPS.lng],{icon:ico}).bindPopup("📍 Tu posición actual").addTo(_map);
  },[posGPS]);

  return(
    <div style={{position:"relative",height:"100%"}}>
      {loadingRuta&&(
        <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,.9)",zIndex:999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:40,animation:"spin 1s linear infinite"}}>🗺️</div>
          <div style={{color:"#4a5568",marginTop:14,fontSize:15,fontWeight:"bold"}}>Trazando la ruta real...</div>
          <div style={{color:"#a0aec0",fontSize:13,marginTop:6}}>Siguiendo las rutas argentinas</div>
        </div>
      )}
      <div ref={ref} style={{width:"100%",height:"100%"}}/>
    </div>
  );
}

// ── MODALES ────────────────────────────────────────────────
function ModalViaje({fV,setFV,onCrear,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,color:"#2d3748"}}>🚗 Nuevo Viaje</div>
        <div style={{fontSize:13,color:"#718096",marginBottom:8}}>La IA planificará 3 opciones según tu ruta y tiempo</div>
        <label style={S.lbl}>📍 Ciudad de origen *</label>
        <input style={S.inp} placeholder="Ej: Tucumán" value={fV.origen} onChange={e=>setFV(p=>({...p,origen:e.target.value}))}/>
        <label style={S.lbl}>🏁 Ciudad de destino *</label>
        <input style={S.inp} placeholder="Ej: Cafayate, Salta" value={fV.destino} onChange={e=>setFV(p=>({...p,destino:e.target.value}))}/>
        <label style={S.lbl}>🚗 Auto (opcional)</label>
        <input style={S.inp} placeholder="Ej: VW Polo blanco" value={fV.auto} onChange={e=>setFV(p=>({...p,auto:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha y hora de retiro del auto *</label>
        <input style={S.inp} type="datetime-local" value={fV.fRetiro} onChange={e=>setFV(p=>({...p,fRetiro:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha y hora de devolución *</label>
        <input style={S.inp} type="datetime-local" value={fV.fDevol} onChange={e=>setFV(p=>({...p,fDevol:e.target.value}))}/>
        <label style={S.lbl}>👨‍👩‍👧 Cantidad de personas</label>
        <input style={S.inp} type="number" min="1" value={fV.pers} onChange={e=>setFV(p=>({...p,pers:e.target.value}))}/>
        <button style={S.btn("#2b6cb0")} onClick={onCrear}>✅ Crear y buscar opciones</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>
    </div>
  );
}

function ModalGasto({fG,setFG,onAgregar,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,marginBottom:12,color:"#2d3748"}}>💰 Agregar Gasto</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {Object.entries(CATS).map(([k,c])=>(
            <button key={k} onClick={()=>setFG(p=>({...p,cat:k}))} style={{background:fG.cat===k?c.color:"white",color:fG.cat===k?"white":"#4a5568",border:`1.5px solid ${fG.cat===k?c.color:"#e2e8f0"}`,borderRadius:10,padding:"10px 8px",cursor:"pointer",fontSize:13,fontWeight:fG.cat===k?"bold":"normal"}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
        <label style={{...S.lbl,marginTop:4}}>Descripción (opcional)</label>
        <input style={S.inp} placeholder="Ej: Almuerzo en Tafí" value={fG.desc} onChange={e=>setFG(p=>({...p,desc:e.target.value}))}/>
        <label style={S.lbl}>Monto ($) *</label>
        <input style={S.inp} type="number" placeholder="Ej: 4500" value={fG.monto} onChange={e=>setFG(p=>({...p,monto:e.target.value}))}/>
        <button style={S.btn("#d69e2e")} onClick={onAgregar}>✅ Agregar</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>
    </div>
  );
}

// ── PANTALLAS ──────────────────────────────────────────────
function PantallaConfig({apiKey,setApiKey}){
  const [tmp,setTmp]=useState(apiKey);
  const [ok,setOk]=useState(false);
  const guardar=()=>{setApiKey(tmp.trim());setOk(true);setTimeout(()=>setOk(false),2500);};
  return(
    <div>
      <div style={S.hdr("#4a5568")}><div style={{fontSize:22,fontWeight:"bold"}}>⚙️ Configuración</div><div style={{fontSize:13,opacity:.8}}>API Key de Groq (gratis)</div></div>
      <div style={{padding:16}}>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:15,marginBottom:8}}>🤖 Tu API Key de Groq</div>
          <div style={{fontSize:13,color:"#718096",marginBottom:12,lineHeight:1.6}}>Necesitás esta clave para que la IA planifique tu viaje. Es <strong>100% gratis</strong>.<br/>📌 Conseguila en: <strong>console.groq.com</strong></div>
          <label style={{...S.lbl,marginTop:0}}>Tu clave (gsk_...)</label>
          <input style={{...S.inp,fontFamily:"monospace",fontSize:12}} type="password" placeholder="gsk_..." value={tmp} onChange={e=>setTmp(e.target.value)}/>
          <button style={S.btn(ok?"#38a169":"#4a5568")} onClick={guardar}>{ok?"✅ ¡Guardada!":"💾 Guardar"}</button>
          <div style={{marginTop:10,padding:10,background:apiKey?"#f0fff4":"#fffbeb",borderRadius:8,textAlign:"center"}}>
            <span style={{fontSize:13,color:apiKey?"#276749":"#744210"}}>{apiKey?"✅ Clave configurada — IA lista":"⚠️ Sin clave — la IA no funcionará"}</span>
          </div>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:14,marginBottom:8}}>📖 Cómo obtenerla (gratis)</div>
          {[["1️⃣","Entrá a console.groq.com"],["2️⃣","Creá una cuenta (podés usar Google)"],["3️⃣","Andá a 'API Keys'"],["4️⃣","Click en 'Create API Key'"],["5️⃣","Copiá y pegá arriba"]].map(([n,t])=>(
            <div key={n} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #f4f4f4",alignItems:"center"}}>
              <span style={{fontSize:16,minWidth:28}}>{n}</span><span style={{fontSize:13,color:"#4a5568"}}>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PantallaInicio({viaje,estado,opciones,loadingIA,apiKey,tRest,pct,alerta,opcionSel,onNuevo,onIniciar,setTab}){
  return(
    <div>
      <div style={S.hdr("#2b6cb0")}><div style={{fontSize:22,fontWeight:"bold"}}>🚗 ViajeFácil</div><div style={{fontSize:13,opacity:.8}}>Tu compañero de viaje inteligente</div></div>
      <div style={{padding:16}}>
        {!viaje?(
          <div style={{...S.card,textAlign:"center",padding:44}}>
            <div style={{fontSize:56}}>🗺️</div>
            <div style={{fontSize:19,fontWeight:"bold",color:"#2d3748",marginTop:14}}>¡Planificá tu viaje!</div>
            <div style={{color:"#718096",fontSize:14,margin:"8px 0 12px"}}>La IA analizará tu ruta y te dará 3 opciones completas con paradas recomendadas</div>
            {!apiKey&&<div style={{background:"#fffbeb",border:"1px solid #f6e05e",borderRadius:10,padding:10,marginBottom:8,fontSize:13,color:"#744210"}}>⚠️ Primero configurá tu API Key en ⚙️ Config</div>}
            <button style={S.btn(apiKey?"#2b6cb0":"#a0aec0")} onClick={apiKey?onNuevo:()=>setTab("config")}>{apiKey?"+ Planificar viaje":"⚙️ Configurar API Key"}</button>
          </div>
        ):(
          <>
            <div style={{...S.card,background:"linear-gradient(135deg,#2b6cb0,#4299e1)",color:"white"}}>
              <div style={{fontSize:12,opacity:.8}}>{estado==="viajando"?"🚦 EN VIAJE":"✈️ Viaje planificado"}</div>
              <div style={{fontSize:20,fontWeight:"bold",marginTop:4}}>📍 {viaje.origen} → {viaje.destino}</div>
              {viaje.auto&&<div style={{fontSize:13,opacity:.8,marginTop:3}}>🚗 {viaje.auto}</div>}
              <div style={{fontSize:12,opacity:.7,marginTop:2}}>👨‍👩‍👧 {viaje.pers} personas · Devolver: {fmtDt(viaje.fDevol)}</div>
            </div>

            {estado==="viajando"&&(
              <>
                {alerta&&<div style={{background:"#fed7d7",border:"2px solid #e53e3e",borderRadius:12,padding:14,marginBottom:12,textAlign:"center"}}><div style={{fontWeight:"bold",color:"#c53030"}}>⚠️ ¡Menos de 3 horas para devolver!</div></div>}
                <div style={{...S.card,textAlign:"center"}}>
                  <div style={{fontSize:12,color:"#718096"}}>⏱ Tiempo restante para devolver el auto</div>
                  <div style={{fontSize:40,fontWeight:"bold",color:pct>80?"#e53e3e":"#2b6cb0",margin:"8px 0"}}>{tRest||"..."}</div>
                  <div style={{background:"#e2e8f0",borderRadius:8,height:10,overflow:"hidden",marginTop:8}}>
                    <div style={{background:pct>80?"#e53e3e":"#2b6cb0",height:"100%",width:`${pct}%`,borderRadius:8,transition:"width .5s"}}/>
                  </div>
                  <div style={{fontSize:11,color:"#a0aec0",marginTop:4}}>Tiempo transcurrido: {pct}%</div>
                </div>
              </>
            )}

            {loadingIA&&(
              <div style={{...S.card,textAlign:"center",padding:32}}>
                <div style={{fontSize:44,animation:"spin 1s linear infinite"}}>🤖</div>
                <div style={{fontWeight:"bold",color:"#2d3748",marginTop:12}}>La IA está planificando tu viaje...</div>
                <div style={{fontSize:13,color:"#718096",marginTop:6}}>Analizando ruta, tiempo y lugares de interés</div>
                <div style={{fontSize:12,color:"#a0aec0",marginTop:4}}>Generando 3 opciones personalizadas</div>
              </div>
            )}

            {opciones&&opciones.length>0&&estado!=="viajando"&&(
              <div style={{...S.card,background:"#f0fff4",border:"1px solid #9ae6b4"}}>
                <div style={{fontWeight:"bold",color:"#276749",marginBottom:4}}>✅ ¡3 opciones listas!</div>
                <div style={{fontSize:13,color:"#4a5568"}}>Andá a 🗂️ Opciones para elegir tu itinerario favorito</div>
                {opcionSel&&<div style={{fontSize:13,color:"#2b6cb0",marginTop:4}}>📌 Opción seleccionada: <strong>{opcionSel.nombre}</strong></div>}
              </div>
            )}

            {opcionSel&&estado==="listo"&&(
              <div style={{...S.card,textAlign:"center",background:"#f0fff4",border:"2px solid #38a169"}}>
                <div style={{fontSize:36}}>🚦</div>
                <div style={{fontWeight:"bold",color:"#276749",fontSize:16,marginTop:8}}>¡Todo listo para partir!</div>
                <div style={{fontSize:13,color:"#718096",margin:"6px 0 4px"}}>Cuando retirés el auto, tocá este botón. Recién ahí empieza el contador.</div>
                <button style={S.btn("#38a169")} onClick={onIniciar}>🚗 Iniciar Viaje</button>
              </div>
            )}

            <button style={S.btn("#2b6cb0",true)} onClick={onNuevo}>+ Nuevo Viaje</button>
          </>
        )}
      </div>
    </div>
  );
}

function PantallaOpciones({opciones,opcionSel,setOpcionSel,loadingIA,viaje,setTab}){
  if(!viaje) return(
    <div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones de Viaje</div></div>
    <div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:36}}><div style={{fontSize:48}}>🗂️</div><div style={{color:"#718096",marginTop:8}}>Creá un viaje primero en 🏠 Inicio</div></div></div></div>
  );
  if(loadingIA) return(
    <div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones de Viaje</div></div>
    <div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:32}}><div style={{fontSize:44,animation:"spin 1s linear infinite"}}>🤖</div><div style={{fontWeight:"bold",color:"#2d3748",marginTop:12}}>Generando opciones...</div></div></div></div>
  );
  if(!opciones||!opciones.length) return(
    <div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones de Viaje</div></div>
    <div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:32}}><div style={{fontSize:44}}>🤖</div><div style={{fontWeight:"bold",color:"#2d3748",marginTop:10}}>Aún no hay opciones</div><div style={{fontSize:13,color:"#718096",marginTop:6}}>Andá a 🏠 Inicio y creá un viaje</div></div></div></div>
  );

  const seleccionar=(op)=>{
    setOpcionSel(op);
    setTab("mapa");
  };

  return(
    <div>
      <div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones de Viaje</div><div style={{fontSize:13,opacity:.8}}>{viaje.origen} → {viaje.destino}</div></div>
      <div style={{padding:16}}>
        <div style={{...S.card,background:"#ebf8ff",padding:12,marginBottom:16}}>
          <div style={{fontSize:13,color:"#2b6cb0"}}>📌 La IA generó <strong>3 opciones</strong> según tu ruta y tiempo disponible. Elegí la que más te guste.</div>
        </div>

        {opciones.map((op,oi)=>{
          const sel=opcionSel?.nombre===op.nombre;
          const colores=["#2b6cb0","#38a169","#805ad5"];
          const c=colores[oi]||"#2b6cb0";
          const totalParadas=op.dias?.reduce((s,d)=>s+(d.paradas?.length||0),0)||0;
          return(
            <div key={oi} style={{...S.card,border:`2px solid ${sel?c:"#e2e8f0"}`,background:sel?`${c}08`:"white",marginBottom:16}}>
              {/* Cabecera opción */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:"bold",fontSize:16,color:c}}>Opción {oi+1}: {op.nombre}</div>
                  <div style={{fontSize:13,color:"#4a5568",marginTop:2}}>{op.descripcion}</div>
                </div>
                <span style={S.bdg(c)}>{op.totalKm||"?"} km</span>
              </div>

              {/* Días */}
              {op.dias?.map((dia,di)=>(
                <div key={di} style={{marginBottom:10}}>
                  <div style={{fontWeight:"bold",color:"#2d3748",fontSize:13,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{background:c,color:"white",borderRadius:6,padding:"2px 8px",fontSize:11}}>Día {dia.dia}</span>
                    <span style={{color:"#718096",fontSize:12}}>{dia.titulo}</span>
                  </div>
                  {dia.paradas?.map((p,pi)=>{
                    const t=TIPOS[p.tipo]||TIPOS.turistico;
                    return(
                      <div key={pi} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid #f4f4f4",alignItems:"flex-start"}}>
                        <div style={{background:t.color,color:"white",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:2}}>{t.icon}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:13}}>{p.nombre}</div>
                          <div style={{fontSize:11,color:"#718096"}}>{t.label}{p.horaLlegada?" · 🕐 "+p.horaLlegada:""}{p.duracion?" · ⏱ "+p.duracion:""}</div>
                          {p.descripcion&&<div style={{fontSize:12,color:"#4a5568",marginTop:2}}>{p.descripcion}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}

              {/* Info pie */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
                <span style={S.bdg("#718096")}>{op.dias?.length||0} días</span>
                <span style={S.bdg("#718096")}>{totalParadas} paradas</span>
              </div>

              <button style={S.btn(c,!sel)} onClick={()=>seleccionar(op)}>
                {sel?"✅ Seleccionada — Ver en Mapa 🗺️":"Elegir esta opción"}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PantallaMapa({viaje,opcionSel,posGPS,estado,loadingRuta}){
  const paradas = opcionSel?.dias?.flatMap(d=>d.paradas||[])||[];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 72px)"}}>
      <div style={S.hdr("#e53e3e")}>
        <div style={{fontSize:22,fontWeight:"bold"}}>🗺️ Mapa del Viaje</div>
        <div style={{fontSize:13,opacity:.8}}>{opcionSel?opcionSel.nombre:estado==="viajando"?"Viaje en curso":"Seleccioná una opción"}</div>
      </div>

      {/* Leyenda */}
      {opcionSel&&(
        <div style={{padding:"8px 12px",background:"white",borderBottom:"1px solid #e2e8f0",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {Object.entries(TIPOS).map(([k,t])=>(
            <div key={k} style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#4a5568"}}>
              <div style={{background:t.color,color:"white",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9}}>{t.icon}</div>
              {t.label}
            </div>
          ))}
          {estado==="viajando"&&posGPS&&(
            <div style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#805ad5",fontWeight:"bold"}}>
              <div style={{background:"#805ad5",color:"white",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9}}>●</div>
              Tu posición
            </div>
          )}
        </div>
      )}

      <div style={{flex:1,position:"relative"}}>
        {!viaje&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#a0aec0",textAlign:"center",padding:20}}>
            <div style={{fontSize:48}}>🗺️</div>
            <div style={{marginTop:10,fontSize:15,color:"#4a5568"}}>Creá un viaje primero</div>
          </div>
        )}
        {viaje&&!opcionSel&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#a0aec0",textAlign:"center",padding:20}}>
            <div style={{fontSize:48}}>🗂️</div>
            <div style={{marginTop:10,fontSize:15,color:"#4a5568"}}>Seleccioná una opción en 🗂️ Opciones</div>
          </div>
        )}
        {viaje&&opcionSel&&<MapaLeaflet paradas={paradas} posGPS={posGPS} loadingRuta={loadingRuta}/>}
      </div>
    </div>
  );
}

function PantallaGastos({gastos,setGastos,pers,setPers,setModal}){
  const total=gastos.reduce((s,g)=>s+g.monto,0);
  const porPers=pers>0?Math.ceil(total/pers):total;
  return(
    <div>
      <div style={S.hdr("#d69e2e")}><div style={{fontSize:22,fontWeight:"bold"}}>💰 Gastos</div><div style={{fontSize:13,opacity:.8}}>Total: {fmtM(total)}</div></div>
      <div style={{padding:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {Object.entries(CATS).map(([k,c])=>{
            const t=gastos.filter(g=>g.cat===k).reduce((s,g)=>s+g.monto,0);
            return(<div key={k} style={{...S.card,textAlign:"center",padding:12,marginBottom:0,borderLeft:`4px solid ${c.color}`}}><div style={{fontSize:22}}>{c.icon}</div><div style={{fontSize:12,color:"#718096",marginTop:2}}>{c.label}</div><div style={{fontSize:16,fontWeight:"bold",color:c.color}}>{fmtM(t)}</div></div>);
          })}
        </div>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:10}}>👨‍👩‍👧 División por persona</div>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:10}}>
            <span style={{fontSize:13,color:"#718096"}}>Personas:</span>
            <button onClick={()=>setPers(p=>Math.max(1,p-1))} style={{width:32,height:32,borderRadius:16,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontWeight:"bold",fontSize:18}}>-</button>
            <span style={{fontWeight:"bold",fontSize:20,minWidth:24,textAlign:"center"}}>{pers}</span>
            <button onClick={()=>setPers(p=>p+1)} style={{width:32,height:32,borderRadius:16,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontWeight:"bold",fontSize:18}}>+</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid #f4f4f4"}}>
            <span style={{color:"#718096",fontSize:14}}>Por persona:</span>
            <span style={{fontWeight:"bold",color:"#d69e2e",fontSize:22}}>{fmtM(porPers)}</span>
          </div>
        </div>
        <button style={S.btn("#d69e2e")} onClick={()=>setModal("gasto")}>+ Agregar Gasto</button>
        {gastos.length>0&&(
          <div style={S.card}>
            <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:8}}>📋 Lista de gastos</div>
            {[...gastos].reverse().map(g=>(
              <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f4f4f4"}}>
                <div><span style={{fontSize:14}}>{CATS[g.cat].icon} </span><span style={{fontSize:13,color:"#2d3748"}}>{g.desc||CATS[g.cat].label}</span><div style={{fontSize:11,color:"#a0aec0"}}>{g.fecha}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontWeight:"bold",color:CATS[g.cat].color}}>{fmtM(g.monto)}</span>
                  <button onClick={()=>setGastos(p=>p.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:"#fc8181",cursor:"pointer",fontSize:18}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}
        {gastos.length===0&&<div style={{...S.card,textAlign:"center",padding:28,color:"#a0aec0"}}><div style={{fontSize:40}}>💸</div><div style={{marginTop:8}}>Sin gastos registrados aún</div></div>}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────
function App(){
  const [tab,       setTab]      = useState("inicio");
  const [apiKey,    setApiKey]   = useState("");
  const [viaje,     setViaje]    = useState(null);
  const [estado,    setEstado]   = useState("nuevo");
  const [opciones,  setOpciones] = useState([]);
  const [opcionSel, setOpcionSel]= useState(null);
  const [loadingIA, setLoadingIA]= useState(false);
  const [loadingM,  setLoadingM] = useState(false);
  const [gastos,    setGastos]   = useState([]);
  const [pers,      setPers]     = useState(2);
  const [modal,     setModal]    = useState(null);
  const [posGPS,    setPosGPS]   = useState(null);
  const [tRest,     setTRest]    = useState("");
  const [pct,       setPct]      = useState(0);
  const [inicioR,   setInicioR]  = useState(null);
  const [fV,setFV] = useState({origen:"",destino:"",auto:"",fRetiro:"",fDevol:"",pers:"2"});
  const [fG,setFG] = useState({cat:"nafta",desc:"",monto:""});

  // Invalidar mapa al cambiar tab
  useEffect(()=>{ if(tab==="mapa"&&_map) setTimeout(()=>_map.invalidateSize(),200); },[tab]);

  // Countdown
  useEffect(()=>{
    if(estado!=="viajando"||!viaje) return;
    const calc=()=>{
      const now=new Date(),dev=new Date(viaje.fDevol),ini=inicioR||now;
      const diff=dev-now,total=dev-ini,usado=now-ini;
      setPct(Math.min(100,Math.max(0,Math.round((usado/total)*100))));
      if(diff<=0){setTRest("¡Tiempo vencido!");return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
      setTRest(`${d}d ${h}h ${m}m`);
    };
    calc();
    const iv=setInterval(calc,30000);
    return()=>clearInterval(iv);
  },[estado,viaje,inicioR]);

  const alerta=estado==="viajando"&&viaje&&(()=>{const d=new Date(viaje.fDevol)-new Date();return d>0&&d<3*3600000;})();

  const crearViaje=()=>{
    if(!fV.origen||!fV.destino||!fV.fRetiro||!fV.fDevol) return;
    const v={id:Date.now(),...fV,pers:parseInt(fV.pers)||2};
    setViaje(v); setOpciones([]); setOpcionSel(null); setEstado("planificando");
    setInicioR(null); setModal(null);
    setFV({origen:"",destino:"",auto:"",fRetiro:"",fDevol:"",pers:"2"});
    setTab("inicio");
    // Buscar IA automáticamente
    setTimeout(()=>buscarIA(v),100);
  };

  const buscarIA=async(viajeData)=>{
    const v=viajeData||viaje;
    if(!v||!apiKey) return;
    setLoadingIA(true); setOpciones([]);
    const dias=calcDias(v.fRetiro,v.fDevol);
    const retiro=fmtDt(v.fRetiro);
    const devol=fmtDt(v.fDevol);
    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          max_tokens:3000,
          messages:[
            {role:"system",content:"Sos un experto en turismo argentino. Conocés perfectamente las rutas, distancias y lugares de interés de Argentina. Siempre respondés con JSON válido y coordenadas geográficas PRECISAS para Argentina."},
            {role:"user",content:`Viaje en auto por Argentina:
- Origen: ${v.origen}
- Destino: ${v.destino}  
- Retiro del auto: ${retiro}
- Devolución: ${devol}
- Duración total: ${dias} día(s)
- Personas: ${v.pers}

Generá 3 opciones de viaje COMPLETAS y DIFERENTES entre sí. Cada opción debe incluir paradas a lo largo de la ruta real (no ir a lugares fuera de la ruta). Las paradas deben ser: miradores, lugares para comer, lugares para descansar, atracciones turísticas y donde dormir.

IMPORTANTE: Las coordenadas lat/lng deben ser EXACTAS y correctas para cada lugar específico en Argentina. Los lugares deben estar a lo largo del camino entre ${v.origen} y ${v.destino}.

Respondé SOLO con este JSON (sin texto extra, sin backticks):
{"opciones":[{"nombre":"string","descripcion":"string","totalKm":number,"dias":[{"dia":number,"titulo":"string","paradas":[{"nombre":"string","tipo":"origen|comida|descanso|mirador|turistico|dormir|destino","descripcion":"string","horaLlegada":"HH:MM","duracion":"string","lat":number,"lng":number}]}]}]}`}
          ]
        })
      });
      const data=await res.json();
      if(data.error){console.error(data.error);setLoadingIA(false);return;}
      const txt=data.choices[0].message.content.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(txt);
      setOpciones(parsed.opciones||[]);
      setEstado("listo");
      setTab("opciones");
    }catch(e){console.error("IA error:",e);}
    setLoadingIA(false);
  };

  const iniciarViaje=()=>{
    setInicioR(new Date()); setEstado("viajando");
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(
        pos=>setPosGPS({lat:pos.coords.latitude,lng:pos.coords.longitude}),
        e=>console.log("GPS:",e),
        {enableHighAccuracy:true,maximumAge:30000}
      );
    }
    setTab("mapa");
  };

  const agregarGasto=()=>{
    if(!fG.monto) return;
    setGastos(p=>[...p,{id:Date.now(),cat:fG.cat,desc:fG.desc,monto:parseFloat(fG.monto),fecha:new Date().toLocaleDateString("es-AR")}]);
    setModal(null); setFG({cat:"nafta",desc:"",monto:""});
  };

  return(
    <div style={S.app}>
      {/* Mapa siempre montado */}
      <div style={{display:tab==="mapa"?"block":"none",height:"calc(100vh - 72px)"}}>
        <PantallaMapa viaje={viaje} opcionSel={opcionSel} posGPS={posGPS} estado={estado} loadingRuta={loadingM}/>
      </div>

      {tab==="inicio"  &&<PantallaInicio viaje={viaje} estado={estado} opciones={opciones} loadingIA={loadingIA} apiKey={apiKey} tRest={tRest} pct={pct} alerta={alerta} opcionSel={opcionSel} onNuevo={()=>setModal("viaje")} onIniciar={iniciarViaje} setTab={setTab}/>}
      {tab==="opciones"&&<PantallaOpciones opciones={opciones} opcionSel={opcionSel} setOpcionSel={setOpcionSel} loadingIA={loadingIA} viaje={viaje} setTab={setTab}/>}
      {tab==="gastos"  &&<PantallaGastos gastos={gastos} setGastos={setGastos} pers={pers} setPers={setPers} setModal={setModal}/>}
      {tab==="config"  &&<PantallaConfig apiKey={apiKey} setApiKey={setApiKey}/>}

      {modal==="viaje"&&<ModalViaje fV={fV} setFV={setFV} onCrear={crearViaje} onCerrar={()=>setModal(null)}/>}
      {modal==="gasto"&&<ModalGasto fG={fG} setFG={setFG} onAgregar={agregarGasto} onCerrar={()=>setModal(null)}/>}

      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={S.nvb(tab===t.id,t.color)} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').then(r=>console.log('SW:',r.scope)).catch(e=>console.log('SW error:',e)));}</script>
</body>
