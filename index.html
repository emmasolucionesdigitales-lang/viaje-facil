<html lang="es">
<head>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="shortcut icon" href="icon-192.png" type="image/png"/>
<link rel="icon" href="icon-192.png" type="image/png"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}
input:focus,textarea:focus,select:focus{outline:2px solid #4299e1}
.leaflet-container{font-family:system-ui!important}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── LOCALSTORAGE ──────────────────────────────────────────
const LS={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},
};

// ── CONSTANTES ────────────────────────────────────────────
const TIPOS={
  origen:  {icon:"🚀",color:"#38a169",label:"Salida"},
  destino: {icon:"🏁",color:"#e53e3e",label:"Destino"},
  ruta:    {icon:"🛑",color:"#718096",label:"Parada ruta"},
  descanso:{icon:"☕",color:"#3182ce",label:"Descanso"},
  comida:  {icon:"🍽️",color:"#ed8936",label:"Comer"},
  turistico:{icon:"⭐",color:"#0bc5ea",label:"Turístico"},
  mirador: {icon:"🏔️",color:"#805ad5",label:"Mirador"},
  dormir:  {icon:"🌙",color:"#2d3748",label:"Dormir"},
};
const CATS={
  nafta:{icon:"⛽",label:"Nafta",color:"#e53e3e"},
  comida:{icon:"🍔",label:"Comida",color:"#ed8936"},
  hospedaje:{icon:"🏨",label:"Hospedaje",color:"#3182ce"},
  actividades:{icon:"🎡",label:"Actividades",color:"#38a169"},
  otro:{icon:"📦",label:"Otro",color:"#718096"},
};
const TABS=[
  {id:"inicio",   icon:"🏠",label:"Inicio",  color:"#2b6cb0"},
  {id:"opciones", icon:"🗂️",label:"Opciones",color:"#38a169"},
  {id:"mapa",     icon:"🗺️",label:"Mapa",    color:"#e53e3e"},
  {id:"gastos",   icon:"💰",label:"Gastos",  color:"#d69e2e"},
  {id:"historial",icon:"📋",label:"Historial",color:"#718096"},
];
const WMO={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"⛈️",80:"🌦️",81:"🌧️",82:"⛈️",95:"⛈️",96:"⛈️",99:"⛈️"};

const fmtM  =n=>"$"+(Math.round(n)||0).toLocaleString("es-AR");
const fmtDt =s=>{try{return new Date(s).toLocaleString("es-AR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}catch{return "—";}};
const fmtDs =s=>{try{return new Date(s).toLocaleDateString("es-AR",{day:"numeric",month:"long",year:"numeric"});}catch{return "—";}};
const fmtHora=s=>{try{return new Date(s).toLocaleString("es-AR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});}catch{return s||"—";}};
function calcDias(f1,f2){return Math.max(1,Math.round((new Date(f2)-new Date(f1))/(1000*60*60*24))+1);}
function calcHoraLimite(fDevol,bufferHoras){
  const d=new Date(fDevol);
  d.setHours(d.getHours()-(bufferHoras||3));
  return d.toLocaleString("es-AR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});
}

async function geocodeNominatim(nombre){
  try{
    const q=encodeURIComponent(nombre);
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&accept-language=es`,{headers:{"User-Agent":"ViajeFacil/1.0"}});
    const d=await r.json();
    if(d.length>0) return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch{}
  return null;
}

async function getOSRM(pts){
  if(pts.length<2) return null;
  try{
    const coords=pts.map(p=>`${p.lng},${p.lat}`).join(";");
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const d=await r.json();
    if(d.code==="Ok") return d.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);
  }catch{}
  return null;
}

async function getClima(lat,lng,fIni,fFin){
  try{
    const d1=new Date(fIni).toISOString().split("T")[0];
    const d2=new Date(fFin).toISOString().split("T")[0];
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&start_date=${d1}&end_date=${d2}`);
    const d=await r.json();
    if(d.daily) return d.daily;
  }catch{}
  return null;
}

const navegarA=(lat,lng,nombre)=>{
  const url=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  window.open(url,"_blank");
};

// ── ESTILOS ───────────────────────────────────────────────
const S={
  app:  {maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f0f4f8",position:"relative",paddingBottom:72},
  hdr:  c=>({background:c,padding:"16px 20px 14px",color:"white"}),
  card: {background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"},
  btn:  (c,l)=>({background:l?`${c}18`:c,color:l?c:"white",border:l?`1.5px solid ${c}`:"none",borderRadius:10,padding:"11px 16px",fontWeight:"bold",fontSize:14,cursor:"pointer",width:"100%",marginTop:8,display:"block"}),
  inp:  {width:"100%",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"10px 13px",fontSize:14,background:"white",marginBottom:4},
  lbl:  {fontSize:12,color:"#718096",marginBottom:5,display:"block",marginTop:12},
  ovr:  {position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"},
  sht:  {background:"white",borderRadius:"18px 18px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto"},
  nav:  {position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:500},
  nvb:  (a,c)=>({flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:a?c:"#a0aec0"}),
  bdg:  c=>({background:`${c}18`,color:c,borderRadius:20,padding:"3px 9px",fontSize:12,fontWeight:"bold",display:"inline-block"}),
  row:  {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f4f4f4"},
};

// ── MAPA ──────────────────────────────────────────────────
let _map=null,_ml=null,_rl=null,_gm=null;
function MapaLeaflet({paradas,posGPS}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||_map) return;
    _map=L.map(ref.current,{zoomControl:true}).setView([-27,-65],6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(_map);
  },[]);
  useEffect(()=>{setTimeout(()=>{if(_map)_map.invalidateSize();},200);},[]);
  useEffect(()=>{
    if(!_map) return;
    if(_ml){_map.removeLayer(_ml);_ml=null;}
    if(_rl){_map.removeLayer(_rl);_rl=null;}
    let pts=(paradas||[]).filter(p=>p.lat&&p.lng&&p.lat>=-55&&p.lat<=-21&&p.lng>=-73&&p.lng<=-53);
    if(!pts.length) return;
    _ml=L.layerGroup().addTo(_map);
    const bounds=[];
    pts.forEach(p=>{
      const t=TIPOS[p.tipo]||TIPOS.turistico;
      const ico=L.divIcon({
        html:`<div style="background:${t.color};color:white;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.4);border:2px solid white;">${t.icon}</div>`,
        className:"",iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]
      });
      let popHtml=`<div style="min-width:220px;font-family:system-ui"><div style="background:${t.color};color:white;padding:8px 12px;margin:-13px -19px 10px;border-radius:4px 4px 0 0;font-weight:bold">${t.icon} ${p.nombre}</div><div style="font-size:12px;color:#555;margin-bottom:6px">${t.label}${p.horaLlegada?" · 🕐 "+p.horaLlegada:""}</div>${p.descripcion?`<div style="font-size:13px;color:#333;margin-bottom:6px">${p.descripcion}</div>`:""}`;
      if(p.alojamientos?.length){popHtml+=`<div style="margin-top:6px;font-weight:bold;font-size:12px">🏨 Hospedaje:</div>`;p.alojamientos.forEach(a=>{popHtml+=`<div style="font-size:12px;padding:2px 0"><b>${a.nombre}</b> · <span style="color:#38a169">${a.precio}</span></div>`;});}
      if(p.restaurantes?.length){popHtml+=`<div style="margin-top:6px;font-weight:bold;font-size:12px">🍽️ Comer:</div>`;p.restaurantes.forEach(r=>{popHtml+=`<div style="font-size:12px;padding:2px 0"><b>${r.nombre}</b> · <span style="color:#ed8936">${r.precio}</span></div>`;});}
      popHtml+=`<a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" style="display:block;margin-top:8px;background:#2b6cb0;color:white;text-align:center;padding:7px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:bold">🧭 Navegar con Google Maps</a></div>`;
      L.marker([p.lat,p.lng],{icon:ico}).bindPopup(popHtml,{maxWidth:260}).addTo(_ml);
      bounds.push([p.lat,p.lng]);
    });
    if(pts.length>=2){
      getOSRM(pts).then(ruta=>{
        if(!_map) return;
        if(_rl){_map.removeLayer(_rl);_rl=null;}
        _rl=L.polyline(ruta||pts.map(p=>[p.lat,p.lng]),{color:"#2b6cb0",weight:5,opacity:.8,dashArray:ruta?null:"10,6"}).addTo(_map);
      });
    }
    if(bounds.length) _map.fitBounds(bounds,{padding:[50,50],maxZoom:11});
  },[paradas]);
  useEffect(()=>{
    if(!_map) return;
    if(_gm){_map.removeLayer(_gm);_gm=null;}
    if(!posGPS) return;
    const ico=L.divIcon({html:`<div style="background:#805ad5;border:3px solid white;border-radius:50%;width:22px;height:22px;animation:pulse 2s infinite"></div>`,className:"",iconSize:[22,22],iconAnchor:[11,11]});
    _gm=L.marker([posGPS.lat,posGPS.lng],{icon:ico}).bindPopup("📍 Tu posición").addTo(_map);
  },[posGPS]);
  return(<div style={{position:"relative",height:"100%"}}><div ref={ref} style={{width:"100%",height:"100%"}}/></div>);
}

// ── COMPONENTE PARADA (timeline + editar + navegar) ───────
function Parada({p,isLast,onEliminar,clave,completada,onCompletar,modoViaje}){
  const [open,setOpen]=useState(false);
  const t=TIPOS[p.tipo]||TIPOS.turistico;
  return(
    <div style={{display:"flex",gap:0,marginBottom:0,opacity:completada?0.5:1}} className="fade-in">
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}>
        <div style={{background:completada?"#a0aec0":t.color,color:"white",borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,zIndex:1,border:"2px solid white",boxShadow:"0 2px 6px rgba(0,0,0,0.2)"}}>{completada?"✓":t.icon}</div>
        {!isLast&&<div style={{width:2,flex:1,background:"#e2e8f0",marginTop:4,marginBottom:4,minHeight:20}}/>}
      </div>
      <div style={{flex:1,paddingLeft:12,paddingBottom:16,paddingTop:2}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:4}}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:14,textDecoration:completada?"line-through":"none"}}>{p.nombre}</div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {p.horaLlegada&&<div style={{background:`${t.color}18`,color:t.color,borderRadius:8,padding:"2px 8px",fontSize:12,fontWeight:"bold"}}>🕐 {p.horaLlegada}</div>}
            {onEliminar&&<button onClick={()=>onEliminar(clave)} style={{background:"none",border:"none",color:"#fc8181",cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>}
          </div>
        </div>
        <div style={{fontSize:12,color:"#718096",marginTop:2}}>{t.label}{p.horaSalida?` · Sale: ${p.horaSalida}`:""}{p.duracion?` · ${p.duracion}`:""}</div>
        {(p.kmDesdeAnterior||p.tiempoManejo)&&<div style={{fontSize:11,color:"#a0aec0",marginTop:2}}>📏 {p.kmDesdeAnterior||""}{p.tiempoManejo?` · ⏱ ${p.tiempoManejo}`:""}</div>}
        {p.descripcion&&<div style={{fontSize:13,color:"#4a5568",marginTop:4,lineHeight:1.4}}>{p.descripcion}</div>}
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          {p.lat&&p.lng&&<button onClick={()=>navegarA(p.lat,p.lng,p.nombre)} style={{background:"#2b6cb018",color:"#2b6cb0",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold"}}>🧭 Navegar</button>}
          {modoViaje&&!completada&&onCompletar&&<button onClick={()=>onCompletar(clave)} style={{background:"#38a16918",color:"#276749",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold"}}>✅ Ya llegué</button>}
        </div>
        {p.alojamientos?.length>0&&(
          <div style={{marginTop:8}}>
            <button onClick={()=>setOpen(o=>!o)} style={{background:"#2d374818",color:"#2d3748",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold",width:"100%",textAlign:"left"}}>🏨 {open?"Ocultar":"Ver"} hospedajes ({p.alojamientos.length}) {open?"▲":"▼"}</button>
            {open&&p.alojamientos.map((a,i)=>(
              <div key={i} style={{marginTop:6,padding:10,background:i===0?"#f0fff4":i===1?"#fffbeb":"#f7fafc",borderRadius:10,border:`1px solid ${i===0?"#9ae6b4":i===1?"#f6e05e":"#e2e8f0"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:"bold",fontSize:13}}>{a.nombre}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:i===0?"#276749":i===1?"#744210":"#4a5568"}}>{i===0?"💚":i===1?"💛":"💜"} {a.precio}</span>
                </div>
                <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{a.descripcion}</div>
              </div>
            ))}
          </div>
        )}
        {p.restaurantes?.length>0&&(
          <div style={{marginTop:8}}>
            <button onClick={()=>setOpen(o=>!o)} style={{background:"#ed893618",color:"#c05621",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold",width:"100%",textAlign:"left"}}>🍽️ {open?"Ocultar":"Ver"} dónde comer ({p.restaurantes.length}) {open?"▲":"▼"}</button>
            {open&&p.restaurantes.map((r,i)=>(
              <div key={i} style={{marginTop:6,padding:10,background:i===0?"#fff7ed":i===1?"#fffbeb":"#f7fafc",borderRadius:10,border:`1px solid ${i===0?"#fed7aa":i===1?"#f6e05e":"#e2e8f0"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:"bold",fontSize:13}}>{r.nombre}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:"#c05621"}}>{i===0?"💚":i===1?"💛":"💜"} {r.precio}</span>
                </div>
                <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{r.descripcion}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── MODALES ───────────────────────────────────────────────
function ModalViaje({fV,setFV,onCrear,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,color:"#2d3748"}}>🚗 Planificar Viaje</div>
        <div style={{fontSize:13,color:"#718096",marginBottom:8}}>La IA genera itinerarios con horarios, atracciones, restaurantes y hospedaje</div>
        <label style={S.lbl}>📍 Ciudad de origen *</label>
        <input style={S.inp} placeholder="Ej: San Miguel de Tucumán" value={fV.origen} onChange={e=>setFV(p=>({...p,origen:e.target.value}))}/>
        <label style={S.lbl}>🏁 Ciudad de destino *</label>
        <input style={S.inp} placeholder="Ej: San Fernando del Valle de Catamarca" value={fV.destino} onChange={e=>setFV(p=>({...p,destino:e.target.value}))}/>
        <label style={S.lbl}>🛣️ Ruta preferida (opcional)</label>
        <input style={S.inp} placeholder="Ej: Por Ruta Nacional 38" value={fV.ruta} onChange={e=>setFV(p=>({...p,ruta:e.target.value}))}/>
        <label style={S.lbl}>🚗 Auto (opcional)</label>
        <input style={S.inp} placeholder="Ej: VW Polo blanco" value={fV.auto} onChange={e=>setFV(p=>({...p,auto:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha y hora de SALIDA *</label>
        <input style={S.inp} type="datetime-local" value={fV.fRetiro} onChange={e=>setFV(p=>({...p,fRetiro:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha y hora de DEVOLUCIÓN *</label>
        <input style={S.inp} type="datetime-local" value={fV.fDevol} onChange={e=>setFV(p=>({...p,fDevol:e.target.value}))}/>
        <label style={S.lbl}>👥 Cantidad de personas</label>
        <input style={S.inp} type="number" min="1" value={fV.pers} onChange={e=>setFV(p=>({...p,pers:e.target.value}))}/>
        <label style={S.lbl}>⏰ Margen antes de devolver el auto</label>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          {[1,2,3,4].map(h=>(
            <button key={h} onClick={()=>setFV(p=>({...p,buffer:h}))}
              style={{background:(fV.buffer||3)===h?"#2b6cb0":"white",color:(fV.buffer||3)===h?"white":"#4a5568",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:"bold",fontSize:14,flex:1}}>{h}hs</button>
          ))}
        </div>
        <label style={S.lbl}>📝 Preferencias (opcional)</label>
        <textarea style={{...S.inp,height:70,resize:"none"}} placeholder="Ej: Viajamos con niños, preferimos hospedaje económico..." value={fV.notas} onChange={e=>setFV(p=>({...p,notas:e.target.value}))}/>
        <button style={S.btn("#2b6cb0")} onClick={onCrear}>🤖 Generar opciones con IA</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>
    </div>
  );
}

function ModalGasto({fG,setFG,onAgregar,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,marginBottom:12,color:"#2d3748"}}>💰 Agregar Gasto</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {Object.entries(CATS).map(([k,c])=>(<button key={k} onClick={()=>setFG(p=>({...p,cat:k}))} style={{background:fG.cat===k?c.color:"white",color:fG.cat===k?"white":"#4a5568",border:`1.5px solid ${fG.cat===k?c.color:"#e2e8f0"}`,borderRadius:10,padding:"10px 8px",cursor:"pointer",fontSize:13,fontWeight:fG.cat===k?"bold":"normal"}}>{c.icon} {c.label}</button>))}
        </div>
        <label style={{...S.lbl,marginTop:4}}>Descripción (opcional)</label>
        <input style={S.inp} placeholder="Ej: Almuerzo" value={fG.desc} onChange={e=>setFG(p=>({...p,desc:e.target.value}))}/>
        <label style={S.lbl}>Monto ($) *</label>

function ModalNafta({fN,setFN,onAgregarComoGasto,onCerrar}){

    <div style={S.ovr} onClick={onCerrar}>

function ModalAgregarParada({onAgregar,onCerrar}){
  const [f,setF]=useState({nombre:"",tipo:"turistico",horaLlegada:"",descripcion:""});
  const [buscando,setBuscando]=useState(false);
  const agregar=async()=>{
    if(!f.nombre) return;
    setBuscando(true);
    const coord=await geocodeNominatim(f.nombre+", Argentina");
    setBuscando(false);
    onAgregar({...f,lat:coord?.lat,lng:coord?.lng,alojamientos:[],restaurantes:[]});
  };
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,marginBottom:12,color:"#2d3748"}}>➕ Agregar Parada Propia</div>

            <button key={k} onClick={()=>setF(p=>({...p,tipo:k}))} style={{background:f.tipo===k?t.color:"white",color:f.tipo===k?"white":"#4a5568",border:`1.5px solid ${f.tipo===k?t.color:"#e2e8f0"}`,borderRadius:8,padding:"8px",cursor:"pointer",fontSize:13}}>{t.icon} {t.label}</button>
          ))}
        </div>
        <label style={S.lbl}>Hora de llegada (opcional)</label>
        <input style={S.inp} type="time" value={f.horaLlegada} onChange={e=>setF(p=>({...p,horaLlegada:e.target.value}))}/>
        <label style={S.lbl}>Descripción (opcional)</label>

// ── APP PRINCIPAL ─────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("inicio");
  const [apiKey,setApiKey]=useState(()=>LS.get("apiKey",""));
  const [viaje,setViaje]=useState(()=>LS.get("viaje",null));
  const [estado,setEstado]=useState(()=>LS.get("estado","nuevo"));
  const [opciones,setOpciones]=useState(()=>LS.get("opciones",[]));
  const [opcionSel,setOpcionSel]=useState(()=>LS.get("opcionSel",null));
  const [gastos,setGastos]=useState(()=>LS.get("gastos",[]));
  const [pers,setPers]=useState(()=>LS.get("pers",2));
  const [historial,setHistorial]=useState(()=>LS.get("historial",[]));
  const [completadas,setCompletadas]=useState(()=>LS.get("completadas",[]));
  const [equipaje,setEquipaje]=useState(()=>LS.get("equipaje",[
    {id:1,texto:"📄 DNI y registro de conducir",ok:false},
    {id:2,texto:"💳 Tarjetas y efectivo",ok:false},
    {id:3,texto:"🔌 Cargadores de celular",ok:false},
    {id:4,texto:"🧉 Mate, termo y yerba",ok:false},
    {id:5,texto:"💊 Botiquín básico",ok:false},
    {id:6,texto:"🧥 Abrigo",ok:false},
    {id:7,texto:"🕶️ Lentes de sol",ok:false},
    {id:8,texto:"💧 Agua para el viaje",ok:false},
  ]));
  const [clima,setClima]=useState(null);
  const [loadingIA,setLoadingIA]=useState(false);
  const [loadingDetalle,setLoadingDetalle]=useState(false);
  const [iaError,setIaError]=useState("");
  const [modal,setModal]=useState(null);
  const [posGPS,setPosGPS]=useState(null);
  const [tRest,setTRest]=useState("");
  const [pct,setPct]=useState(0);
  const [inicioR,setInicioR]=useState(()=>{const v=LS.get("inicioR");return v?new Date(v):null;});
  const [notif3h,setNotif3h]=useState(false);
  const [fV,setFV]=useState({origen:"",destino:"",ruta:"",auto:"",fRetiro:"",fDevol:"",pers:"2",buffer:3,notas:""});
  const [fG,setFG]=useState({cat:"nafta",desc:"",monto:""});
  const [fN,setFN]=useState({km:"",rend:"12",precio:""});

  useEffect(()=>LS.set("viaje",viaje),[viaje]);
  useEffect(()=>LS.set("estado",estado),[estado]);
  useEffect(()=>LS.set("opciones",opciones),[opciones]);
  useEffect(()=>LS.set("opcionSel",opcionSel),[opcionSel]);
  useEffect(()=>LS.set("gastos",gastos),[gastos]);
  useEffect(()=>LS.set("pers",pers),[pers]);
  useEffect(()=>LS.set("historial",historial),[historial]);
  useEffect(()=>LS.set("completadas",completadas),[completadas]);
  useEffect(()=>LS.set("equipaje",equipaje),[equipaje]);
  useEffect(()=>{if(inicioR)LS.set("inicioR",inicioR.toISOString());},[inicioR]);
  useEffect(()=>{if(tab==="mapa"&&_map)setTimeout(()=>_map.invalidateSize(),200);},[tab]);

  // Clima al crear viaje
  useEffect(()=>{
    if(!viaje?.destino) {setClima(null);return;}
    (async()=>{
      const coord=await geocodeNominatim(viaje.destino+", Argentina");
      if(coord){
        const c=await getClima(coord.lat,coord.lng,viaje.fRetiro,viaje.fDevol);
        if(c) setClima(c);
      }
    })();
  },[viaje?.id]);

  // Countdown + notificación
  useEffect(()=>{
    if(estado!=="viajando"||!viaje) return;
    const calc=()=>{
      const now=new Date(),dev=new Date(viaje.fDevol),ini=inicioR||now;
      const diff=dev-now,total=dev-ini,usado=now-ini;
      setPct(Math.min(100,Math.max(0,Math.round((usado/total)*100))));
      if(diff<=0){setTRest("¡Tiempo vencido!");return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
      setTRest(`${d}d ${h}h ${m}m`);
      // Notificación a las 3 horas
      if(diff<3*3600000&&!notif3h&&"Notification" in window&&Notification.permission==="granted"){
        new Notification("⚠️ ViajeFácil",{body:"Quedan menos de 3 horas para devolver el auto. ¡Emprendé el regreso!",icon:"icon-192.png"});
        setNotif3h(true);
      }
    };
    calc();
    const iv=setInterval(calc,30000);
    return()=>clearInterval(iv);
  },[estado,viaje,inicioR,notif3h]);

  const alerta=estado==="viajando"&&viaje&&(()=>{const d=new Date(viaje.fDevol)-new Date();return d>0&&d<3*3600000;})();

  const crearViaje=()=>{
    if(!fV.origen||!fV.destino||!fV.fRetiro||!fV.fDevol) return;
    const v={id:Date.now(),...fV,pers:parseInt(fV.pers)||2,buffer:parseInt(fV.buffer)||3};
    setViaje(v);setOpciones([]);setOpcionSel(null);setGastos([]);setCompletadas([]);
    setEstado("planificando");setInicioR(null);setIaError("");setNotif3h(false);
    LS.del("inicioR");setModal(null);
    setFV({origen:"",destino:"",ruta:"",auto:"",fRetiro:"",fDevol:"",pers:"2",buffer:3,notas:""});
    setTab("inicio");
    setTimeout(()=>buscarIA(v),200);
  };

  const buscarIA=async(viajeData)=>{
    const v=viajeData||viaje;
    if(!v||!apiKey){setIaError("Configurá tu API Key en ⚙️");return;}
    setLoadingIA(true);setOpciones([]);setIaError("");
    const dias=calcDias(v.fRetiro,v.fDevol);
    const horaLimite=calcHoraLimite(v.fDevol,v.buffer);
    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",max_tokens:2000,temperature:0.4,
          response_format:{"type":"json_object"},
          messages:[
            {role:"system",content:"Sos un experto en turismo argentino. Respondes solo JSON valido."},
            {role:"user",content:`Viaje en auto Argentina: ${v.origen} → ${v.destino}. Ruta: ${v.ruta||"directa"}. ${dias} dias. ${v.pers} personas. Salida: ${fmtHora(v.fRetiro)}. Regreso limite: ${horaLimite}.${v.notas?" Preferencias: "+v.notas:""}

3 estilos de viaje distintos.

JSON: {"opciones":[{"nombre":"str","descripcion":"str","estilo":"cultural","totalKm":280,"ciudadesEtapa":["c1","c2"]},{"nombre":"str","descripcion":"str","estilo":"naturaleza","totalKm":300,"ciudadesEtapa":["c1"]},{"nombre":"str","descripcion":"str","estilo":"gastronomico","totalKm":280,"ciudadesEtapa":["c1","c2"]}]}`}
          ]
        })
      });
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      const parsed=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,""));
      if(!parsed.opciones?.length) throw new Error("Sin opciones");
      setOpciones(parsed.opciones);
      setEstado("listo");
      setTab("opciones");
    }catch(e){setIaError(e.message||"Error. Verificá tu API Key.");}
    setLoadingIA(false);
  };

  const generarItinerario=async(opcion)=>{
    if(!viaje||!apiKey) return;
    setLoadingDetalle(true);
    const dias=calcDias(viaje.fRetiro,viaje.fDevol);
    const salida=fmtHora(viaje.fRetiro);
    const horaLimite=calcHoraLimite(viaje.fDevol,viaje.buffer);
    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",max_tokens:8000,temperature:0.3,
          response_format:{"type":"json_object"},
          messages:[
            {role:"system",content:"Sos un guia turistico local experto en Argentina. Respondes solo JSON valido."},
            {role:"user",content:`Itinerario COMPLETO estilo "${opcion.estilo}":
${viaje.origen} → ${viaje.destino} | Ruta: ${viaje.ruta||"directa"} | Salida: ${salida} | ${dias} dias | ${viaje.pers} personas
LIMITE REGRESO: estar en ${viaje.origen} antes de ${horaLimite}
Ciudades: ${opcion.ciudadesEtapa?.join(", ")||""}
${viaje.notas?"Preferencias: "+viaje.notas:""}

REGLAS:
1. CADA HORA planificada: manana(8-12), mediodia(12-14), siesta(14-16), tarde(16-19), merienda(17), noche(19-23)
2. Llegada nocturna: hotel + paseo plaza nocturno + cena (3 paradas separadas)
3. Desayuno 8hs cada manana
4. Minimo 7-8 paradas/dia, cada lugar = parada separada
5. Ultimo dia: salir a tiempo para llegar antes de ${horaLimite}
6. Desvios max 60km
7. Nombres REALES de lugares
8. dormir: 3 alojamientos menor a mayor precio / comida: 3 restaurantes menor a mayor
9. lat/lng REALES de Argentina

Tipos: origen,ruta,descanso,comida,turistico,mirador,dormir,destino

JSON: {"dias":[{"dia":1,"titulo":"str","kmDelDia":0,"paradas":[{"nombre":"str","tipo":"str","descripcion":"str","horaLlegada":"HH:MM","horaSalida":"HH:MM","duracion":"str","kmDesdeAnterior":"str","tiempoManejo":"str","lat":-27.5,"lng":-65.8,"alojamientos":[],"restaurantes":[]}]}]}`}
          ]
        })
      });
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      const parsed=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,""));
      if(!parsed.dias) throw new Error("Formato incorrecto");
      const esAR=(lat,lng)=>lat&&lng&&lat>=-55&&lat<=-21&&lng>=-73&&lng<=-53;
      for(const dia of parsed.dias||[]){
        for(const p of dia.paradas||[]){
          if(!esAR(p.lat,p.lng)){
            const coord=await geocodeNominatim(p.nombre+", Argentina");
            if(coord){p.lat=coord.lat;p.lng=coord.lng;}
          }
        }
      }
      const completa={...opcion,dias:parsed.dias};
      setOpcionSel(completa);
      LS.set("opcionSel",completa);
      setCompletadas([]);
      setTab("mapa");
    }catch(e){alert("Error: "+e.message);}
    setLoadingDetalle(false);
  };

  const iniciarViaje=()=>{
    setInicioR(new Date());setEstado("viajando");setNotif3h(false);
    if("Notification" in window&&Notification.permission==="default") Notification.requestPermission();
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(
        pos=>setPosGPS({lat:pos.coords.latitude,lng:pos.coords.longitude}),
        e=>console.log("GPS:",e),{enableHighAccuracy:true,maximumAge:30000}
      );
    }
    setTab("inicio");
  };

  const finalizarViaje=()=>{
    if(!viaje) return;
    const reg={id:Date.now(),fechaFin:new Date().toISOString(),viaje,opciones,opcionSel,gastos,pers};
    setHistorial(prev=>[...prev,reg]);
    setViaje(null);setOpciones([]);setOpcionSel(null);setGastos([]);setCompletadas([]);
    setEstado("nuevo");setInicioR(null);setIaError("");setClima(null);
    ["viaje","opciones","opcionSel","gastos","estado","inicioR","completadas"].forEach(k=>LS.del(k));
    setTab("historial");
  };

  const compartirWhatsApp=()=>{
    if(!opcionSel?.dias||!viaje) return;
    let txt=`🚗 *ViajeFácil* — ${viaje.origen} → ${viaje.destino}\n`;
    txt+=`📅 Salida: ${fmtDt(viaje.fRetiro)}\n⏰ Devolución: ${fmtDt(viaje.fDevol)}\n👥 ${viaje.pers} personas\n\n`;
    opcionSel.dias.forEach(d=>{
      txt+=`*📅 Día ${d.dia}: ${d.titulo}*\n`;
      d.paradas?.forEach(p=>{
        const t=TIPOS[p.tipo]||TIPOS.turistico;
        txt+=`${t.icon} ${p.horaLlegada||""} — ${p.nombre}\n`;
      });
      txt+=`\n`;
    });
    txt+=`_Generado con ViajeFácil_`;
    window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");
  };

  const eliminarParada=(clave)=>{
    if(!opcionSel?.dias) return;
    const [di,pi]=clave.split("-").map(Number);
    const nueva={...opcionSel,dias:opcionSel.dias.map((d,i)=>i!==di?d:{...d,paradas:d.paradas.filter((_,j)=>j!==pi)})};
    setOpcionSel(nueva);
    LS.set("opcionSel",nueva);
  };

  const agregarParada=(parada)=>{
    if(!opcionSel?.dias) return;
    // Agregar al último día por defecto
    const ultimoDia=opcionSel.dias.length-1;
    const nueva={...opcionSel,dias:opcionSel.dias.map((d,i)=>i!==ultimoDia?d:{...d,paradas:[...(d.paradas||[]),parada]})};
    setOpcionSel(nueva);
    LS.set("opcionSel",nueva);
    setModal(null);
  };

  const completarParada=(clave)=>{
    setCompletadas(p=>[...p,clave]);
  };

  const agregarGasto=()=>{
    if(!fG.monto) return;
    setGastos(p=>[...p,{id:Date.now(),cat:fG.cat,desc:fG.desc,monto:parseFloat(fG.monto),fecha:new Date().toLocaleDateString("es-AR")}]);
    setModal(null);setFG({cat:"nafta",desc:"",monto:""});
  };

  return(
    <div style={S.app}>
      <div style={{display:tab==="mapa"?"block":"none",height:"calc(100vh - 72px)"}}>
        <PantallaMapa viaje={viaje} opcionSel={opcionSel} posGPS={posGPS} estado={estado}/>
      </div>
      {tab==="inicio"    &&<PantallaInicio viaje={viaje} estado={estado} opciones={opciones} loadingIA={loadingIA} iaError={iaError} apiKey={apiKey} tRest={tRest} pct={pct} alerta={alerta} opcionSel={opcionSel} historial={historial} clima={clima} equipaje={equipaje} setEquipaje={setEquipaje} completadas={completadas} onCompletar={completarParada} onNuevo={()=>setModal("viaje")} onIniciar={iniciarViaje} onFinalizar={finalizarViaje} onCompartir={compartirWhatsApp} setTab={setTab} onReintentar={()=>buscarIA(viaje)}/>}
      {tab==="opciones"  &&<PantallaOpciones opciones={opciones} opcionSel={opcionSel} loadingIA={loadingIA} viaje={viaje} setTab={setTab} generarItinerario={generarItinerario} loadingDetalle={loadingDetalle} onEliminarParada={eliminarParada} onAbrirAgregarParada={()=>setModal("parada")} onCompartir={compartirWhatsApp}/>}
      {tab==="gastos"    &&<PantallaGastos gastos={gastos} setGastos={setGastos} pers={pers} setPers={setPers} setModal={setModal}/>}
      {tab==="historial" &&<PantallaHistorial historial={historial} onEliminar={id=>setHistorial(p=>p.filter(h=>h.id!==id))}/>}
      {tab==="config"    &&<PantallaConfig apiKey={apiKey} setApiKey={setApiKey}/>}
      {modal==="viaje" &&<ModalViaje fV={fV} setFV={setFV} onCrear={crearViaje} onCerrar={()=>setModal(null)}/>}
      {modal==="gasto" &&<ModalGasto fG={fG} setFG={setFG} onAgregar={agregarGasto} onCerrar={()=>setModal(null)}/>}
      {modal==="nafta" &&<ModalNafta fN={fN} setFN={setFN} onAgregarComoGasto={(costo,km)=>{setGastos(p=>[...p,{id:Date.now(),cat:"nafta",desc:`Nafta — ${km} km`,monto:costo,fecha:new Date().toLocaleDateString("es-AR")}]);setModal(null);}} onCerrar={()=>setModal(null)}/>}
      {modal==="parada"&&<ModalAgregarParada onAgregar={agregarParada} onCerrar={()=>setModal(null)}/>}
      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={{...S.nvb(tab===t.id,t.color),position:"relative"}} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
            {t.id==="historial"&&historial.length>0&&<div style={{position:"absolute",top:6,right:"50%",transform:"translateX(10px)",background:"#718096",color:"white",borderRadius:"50%",width:15,height:15,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>{historial.length}</div>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));}</script>
</body>
</html>
