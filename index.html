<script type="text/babel">
const {useState,useEffect,useRef}=React;
const VERSION="7.4";

// ── LOCALSTORAGE ──────────────────────────────────────────
const LS={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},
};

// ── CONSTANTES ────────────────────────────────────────────
const TIPOS={
  origen:  {icon:"🚀",color:"#38a169",label:"Salida"},
  destino: {icon:"🏁",color:"#e53e3e",label:"Destino"},
  ruta:    {icon:"🛑",color:"#718096",label:"Parada ruta"},
  descanso:{icon:"☕",color:"#3182ce",label:"Descanso"},
  comida:  {icon:"🍽️",color:"#ed8936",label:"Comer"},
  turistico:{icon:"⭐",color:"#0bc5ea",label:"Turístico"},
  mirador: {icon:"🏔️",color:"#805ad5",label:"Mirador"},
  dormir:  {icon:"🌙",color:"#2d3748",label:"Dormir"},
};
const CATS={
  nafta:{icon:"⛽",label:"Nafta",color:"#e53e3e"},
  comida:{icon:"🍔",label:"Comida",color:"#ed8936"},
  hospedaje:{icon:"🏨",label:"Hospedaje",color:"#3182ce"},
  actividades:{icon:"🎡",label:"Actividades",color:"#38a169"},
  otro:{icon:"📦",label:"Otro",color:"#718096"},
};
const TABS=[
  {id:"inicio",   icon:"🏠",label:"Inicio",  color:"#2b6cb0"},
  {id:"opciones", icon:"🗂️",label:"Opciones",color:"#38a169"},
  {id:"mapa",     icon:"🗺️",label:"Mapa",    color:"#e53e3e"},
  {id:"gastos",   icon:"💰",label:"Gastos",  color:"#d69e2e"},
  {id:"historial",icon:"📋",label:"Historial",color:"#718096"},
];
const WMO={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"⛈️",80:"🌦️",81:"🌧️",82:"⛈️",95:"⛈️",96:"⛈️",99:"⛈️"};

const fmtM  =n=>"$"+(Math.round(n)||0).toLocaleString("es-AR");
const fmtDt =s=>{try{return new Date(s).toLocaleString("es-AR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}catch{return "—";}};
const fmtDs =s=>{try{return new Date(s).toLocaleDateString("es-AR",{day:"numeric",month:"long",year:"numeric"});}catch{return "—";}};
const fmtHora=s=>{try{return new Date(s).toLocaleString("es-AR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});}catch{return s||"—";}};
function calcDias(f1,f2){return Math.max(1,Math.round((new Date(f2)-new Date(f1))/(1000*60*60*24))+1);}
function calcHoraLimite(fDevol,bufferHoras){
  const d=new Date(fDevol);
  d.setHours(d.getHours()-(bufferHoras||3));
  return d.toLocaleString("es-AR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// Llama a Groq con reintento automático si hay rate-limit temporal (respeta el tiempo de espera que sugiere la API).
// reasoning_effort:"low" + include_reasoning:false evita que el modelo gaste tokens "pensando" en silencio.
async function callGroq(apiKey,messages,maxTokens,temperature,intento=0){
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
    body:JSON.stringify({model:"openai/gpt-oss-120b",max_tokens:maxTokens,temperature,response_format:{"type":"json_object"},reasoning_effort:"low",include_reasoning:false,messages})
  });
  const data=await res.json();
  if(!res.ok||data.error){
    const msg=data?.error?.message||`Error HTTP ${res.status}`;
    const m=msg.match(/try again in ([\d.]+)s/i);
    if(m&&intento<3){
      const espera=Math.min(30,Math.ceil(parseFloat(m[1]))+1);
      await sleep(espera*1000);
      return callGroq(apiKey,messages,maxTokens,temperature,intento+1);
    }
    throw new Error(msg);
  }
  return data;
}

async function geocodeNominatim(nombre){
  try{
    const q=encodeURIComponent(nombre);
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&accept-language=es`,{headers:{"User-Agent":"ViajeFacil/1.0"}});
    const d=await r.json();
    if(d.length>0) return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch{}
  return null;
}

async function getOSRM(pts){
  if(pts.length<2) return null;
  try{
    const coords=pts.map(p=>`${p.lng},${p.lat}`).join(";");
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const d=await r.json();
    if(d.code==="Ok") return d.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);
  }catch{}
  return null;
}

async function getClima(lat,lng,fIni,fFin){
  try{
    const hoy=new Date(); hoy.setHours(0,0,0,0);
    let d1=new Date(fIni), d2=new Date(fFin);
    if(d1<hoy) d1=new Date(hoy);
    const max=new Date(hoy); max.setDate(max.getDate()+15);
    if(d2>max) d2=new Date(max);
    if(d1>d2) return null;
    const s1=d1.toISOString().split("T")[0];
    const s2=d2.toISOString().split("T")[0];
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&start_date=${s1}&end_date=${s2}`);
    const d=await r.json();
    if(d.daily) return d.daily;
  }catch{}
  return null;
}

const navegarA=(lat,lng,nombre)=>{
  const url=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  window.open(url,"_blank");
};

// ── ESTILOS ───────────────────────────────────────────────
const S={
  app:  {maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"var(--bg)",position:"relative",paddingBottom:72},
  hdr:  c=>({background:c,padding:"16px 20px 14px",color:"white"}),
  card: {background:"var(--card-bg)",color:"var(--text)",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"},
  btn:  (c,l)=>({background:l?`${c}18`:c,color:l?c:"white",border:l?`1.5px solid ${c}`:"none",borderRadius:10,padding:"11px 16px",fontWeight:"bold",fontSize:14,cursor:"pointer",width:"100%",marginTop:8,display:"block"}),
  inp:  {width:"100%",border:"1.5px solid var(--border)",borderRadius:10,padding:"10px 13px",fontSize:14,background:"var(--input-bg)",color:"var(--text)",marginBottom:4},
  lbl:  {fontSize:12,color:"var(--text-soft)",marginBottom:5,display:"block",marginTop:12},
  ovr:  {position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"},
  sht:  {background:"var(--card-bg)",color:"var(--text)",borderRadius:"18px 18px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto"},
  nav:  {position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"var(--card-bg)",borderTop:"1px solid var(--border)",display:"flex",zIndex:500},
  nvb:  (a,c)=>({flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:a?c:"#a0aec0"}),
  bdg:  c=>({background:`${c}18`,color:c,borderRadius:20,padding:"3px 9px",fontSize:12,fontWeight:"bold",display:"inline-block"}),
  row:  {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"},
};

// ── MAPA ──────────────────────────────────────────────────
let _map=null,_ml=null,_rl=null,_gm=null,_lastBounds=null;
window._centrarMapa=(lat,lng)=>{if(_map&&lat&&lng){_map.setView([lat,lng],14);}};
function MapaLeaflet({paradas,posGPS}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||_map) return;
    _map=L.map(ref.current,{zoomControl:true}).setView([-27,-65],6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(_map);
    setTimeout(()=>{if(_map)_map.invalidateSize();},150);
  },[]);
  useEffect(()=>{
    if(!_map) return;
    if(_ml){_map.removeLayer(_ml);_ml=null;}
    if(_rl){_map.removeLayer(_rl);_rl=null;}
    let pts=(paradas||[]).filter(p=>p.lat&&p.lng&&p.lat>=-55&&p.lat<=-21&&p.lng>=-73&&p.lng<=-53);
    if(!pts.length) return;
    _ml=L.layerGroup().addTo(_map);
    const bounds=[];
    pts.forEach((p,idx)=>{
      const t=TIPOS[p.tipo]||TIPOS.turistico;
      const ico=L.divIcon({
        html:`<div style="position:relative;width:38px;height:38px"><div style="background:${t.color};color:white;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.4);border:2px solid white;">${t.icon}</div><div style="position:absolute;top:-5px;right:-5px;background:#1a202c;color:white;border-radius:50%;min-width:17px;height:17px;font-size:10px;font-weight:bold;display:flex;align-items:center;justify-content:center;border:1.5px solid white;padding:0 2px">${idx+1}</div></div>`,
        className:"",iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]
      });
      let popHtml=`<div style="min-width:220px;font-family:system-ui"><div style="background:${t.color};color:white;padding:8px 12px;margin:-13px -19px 10px;border-radius:4px 4px 0 0;font-weight:bold">#${idx+1} ${t.icon} ${p.nombre}</div><div style="font-size:12px;color:#555;margin-bottom:6px">${t.label}${p.horaLlegada?" · 🕐 Llega "+p.horaLlegada:""}${p.horaSalida?" · Sale "+p.horaSalida:""}</div>${p.descripcion?`<div style="font-size:13px;color:#333;margin-bottom:6px">${p.descripcion}</div>`:""}${p.kmDesdeAnterior?`<div style="font-size:11px;color:#888">📏 ${p.kmDesdeAnterior}${p.tiempoManejo?" · ⏱ "+p.tiempoManejo:""}</div>`:""}`;
      if(p.alojamientos?.length){popHtml+=`<div style="margin-top:6px;font-weight:bold;font-size:12px">🏨 Hospedaje (sugerido por IA — verificar):</div>`;p.alojamientos.forEach(a=>{popHtml+=`<div style="font-size:12px;padding:2px 0"><b>${a.nombre}</b> · <span style="color:#38a169">${a.precio}</span></div>`;});}
      if(p.restaurantes?.length){popHtml+=`<div style="margin-top:6px;font-weight:bold;font-size:12px">🍽️ Comer (sugerido por IA — verificar):</div>`;p.restaurantes.forEach(r=>{popHtml+=`<div style="font-size:12px;padding:2px 0"><b>${r.nombre}</b> · <span style="color:#ed8936">${r.precio}</span></div>`;});}
      popHtml+=`<a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" style="display:block;margin-top:8px;background:#2b6cb0;color:white;text-align:center;padding:7px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:bold">🧭 Navegar</a></div>`;
      L.marker([p.lat,p.lng],{icon:ico}).bindPopup(popHtml,{maxWidth:260}).addTo(_ml);
      bounds.push([p.lat,p.lng]);
    });
    if(pts.length>=2){
      getOSRM(pts).then(ruta=>{
        if(!_map) return;
        if(_rl){_map.removeLayer(_rl);_rl=null;}
        _rl=L.polyline(ruta||pts.map(p=>[p.lat,p.lng]),{color:"#2b6cb0",weight:5,opacity:.8,dashArray:ruta?null:"10,6"}).addTo(_map);
      });
    }
    if(bounds.length){_lastBounds=bounds;_map.fitBounds(bounds,{padding:[40,40],maxZoom:11});}
  },[paradas]);
  useEffect(()=>{
    if(!_map) return;
    if(_gm){_map.removeLayer(_gm);_gm=null;}
    if(!posGPS) return;
    const ico=L.divIcon({html:`<div style="background:#805ad5;border:3px solid white;border-radius:50%;width:22px;height:22px;animation:pulse 2s infinite"></div>`,className:"",iconSize:[22,22],iconAnchor:[11,11]});
    _gm=L.marker([posGPS.lat,posGPS.lng],{icon:ico}).bindPopup("📍 Tu posición").addTo(_map);
  },[posGPS]);
  return(<div style={{position:"relative",height:"100%"}}><div ref={ref} style={{width:"100%",height:"100%"}}/></div>);
}

// ── COMPONENTE PARADA (timeline + editar + navegar) ───────
function Parada({p,isLast,isFirst,onEliminar,onEditar,onMover,clave,completada,onCompletar,modoViaje}){
  const [openA,setOpenA]=useState(false);
  const [openR,setOpenR]=useState(false);
  const t=TIPOS[p.tipo]||TIPOS.turistico;
  return(
    <div style={{display:"flex",gap:0,marginBottom:0,opacity:completada?0.5:1}} className="fade-in">
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}>
        <div style={{background:completada?"#a0aec0":t.color,color:"white",borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,zIndex:1,border:"2px solid white",boxShadow:"0 2px 6px rgba(0,0,0,0.2)"}}>{completada?"✓":t.icon}</div>
        {!isLast&&<div style={{width:2,flex:1,background:"var(--border)",marginTop:4,marginBottom:4,minHeight:20}}/>}
      </div>
      <div style={{flex:1,paddingLeft:12,paddingBottom:16,paddingTop:2}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:4}}>
          <div style={{fontWeight:"bold",color:"var(--text)",fontSize:14,textDecoration:completada?"line-through":"none"}}>{p.nombre}</div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {p.horaLlegada&&<div style={{background:`${t.color}18`,color:t.color,borderRadius:8,padding:"2px 8px",fontSize:12,fontWeight:"bold"}}>🕐 {p.horaLlegada}</div>}
            {onEliminar&&<button onClick={()=>onEliminar(clave)} aria-label="Eliminar parada" style={{background:"none",border:"none",color:"#fc8181",cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>}
          </div>
        </div>
        <div style={{fontSize:12,color:"var(--text-soft)",marginTop:2}}>{t.label}{p.horaSalida?` · Sale: ${p.horaSalida}`:""}{p.duracion?` · ${p.duracion}`:""}</div>
        {(p.kmDesdeAnterior||p.tiempoManejo)&&<div style={{fontSize:11,color:"#a0aec0",marginTop:2}}>📏 {p.kmDesdeAnterior||""}{p.tiempoManejo?` · ⏱ ${p.tiempoManejo}`:""}</div>}
        {p.descripcion&&<div style={{fontSize:13,color:"var(--text)",marginTop:4,lineHeight:1.4}}>{p.descripcion}</div>}
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          {p.lat&&p.lng&&<button onClick={()=>navegarA(p.lat,p.lng,p.nombre)} style={{background:"#2b6cb018",color:"#2b6cb0",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold"}}>🧭 Navegar</button>}
          {onEditar&&<button onClick={()=>onEditar(clave)} aria-label="Editar parada" style={{background:"#80568018",color:"#805ad5",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold"}}>✏️ Editar</button>}
          {onMover&&<button onClick={()=>onMover(clave,-1)} disabled={isFirst} aria-label="Mover parada arriba" style={{background:"#71809618",color:"#4a5568",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:isFirst?"default":"pointer",fontWeight:"bold",opacity:isFirst?0.35:1}}>⬆️</button>}
          {onMover&&<button onClick={()=>onMover(clave,1)} disabled={isLast} aria-label="Mover parada abajo" style={{background:"#71809618",color:"#4a5568",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:isLast?"default":"pointer",fontWeight:"bold",opacity:isLast?0.35:1}}>⬇️</button>}
          {modoViaje&&!completada&&onCompletar&&<button onClick={()=>onCompletar(clave)} style={{background:"#38a16918",color:"#276749",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold"}}>✅ Ya llegué</button>}
        </div>
        {p.alojamientos?.length>0&&(
          <div style={{marginTop:8}}>
            <button onClick={()=>setOpenA(o=>!o)} style={{background:"#2d374818",color:"#2d3748",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold",width:"100%",textAlign:"left"}}>🏨 {openA?"Ocultar":"Ver"} hospedajes ({p.alojamientos.length}) {openA?"▲":"▼"}</button>
            {openA&&(<>
            <div style={{fontSize:10,color:"#a0aec0",marginTop:4}}>⚠️ Sugerencias de IA — verificá disponibilidad y precio real</div>
            {p.alojamientos.map((a,i)=>(
              <div key={i} style={{marginTop:6,padding:10,background:i===0?"#f0fff4":i===1?"#fffbeb":"#f7fafc",borderRadius:10,border:`1px solid ${i===0?"#9ae6b4":i===1?"#f6e05e":"#e2e8f0"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:"bold",fontSize:13,color:"#2d3748"}}>{a.nombre}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:i===0?"#276749":i===1?"#744210":"#4a5568"}}>{i===0?"💚":i===1?"💛":"💜"} {a.precio}</span>
                </div>
                <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{a.descripcion}</div>
              </div>
            ))}
            </>)}
          </div>
        )}
        {p.restaurantes?.length>0&&(
          <div style={{marginTop:8}}>
            <button onClick={()=>setOpenR(o=>!o)} style={{background:"#ed893618",color:"#c05621",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold",width:"100%",textAlign:"left"}}>🍽️ {openR?"Ocultar":"Ver"} dónde comer ({p.restaurantes.length}) {openR?"▲":"▼"}</button>
            {openR&&(<>
            <div style={{fontSize:10,color:"#a0aec0",marginTop:4}}>⚠️ Sugerencias de IA — verificá disponibilidad y precio real</div>
            {p.restaurantes.map((r,i)=>(
              <div key={i} style={{marginTop:6,padding:10,background:i===0?"#fff7ed":i===1?"#fffbeb":"#f7fafc",borderRadius:10,border:`1px solid ${i===0?"#fed7aa":i===1?"#f6e05e":"#e2e8f0"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:"bold",fontSize:13,color:"#2d3748"}}>{r.nombre}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:"#c05621"}}>{i===0?"💚":i===1?"💛":"💜"} {r.precio}</span>
                </div>
                <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{r.descripcion}</div>
              </div>
            ))}
            </>)}
          </div>
        )}
      </div>
    </div>

    if(!f.nombre) return;
    setBuscando(true);
    const coord=await geocodeNominatim(f.nombre+", Argentina");

    onAgregar({...f,lat:coord?.lat,lng:coord?.lng,alojamientos:[],restaurantes:[]},diaSel);

  return(
    <div style={S.ovr} onClick={onCerrar}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:22,fontWeight:"bold"}}>🚗 ViajeFácil</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{fontSize:10,opacity:.6,background:"rgba(255,255,255,0.2)",borderRadius:6,padding:"2px 6px"}}>v{VERSION}</div>
            <button onClick={()=>setTab("config")} aria-label="Abrir configuración" style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>⚙️</button>
          </div>
        </div>
        <div style={{fontSize:13,opacity:.8}}>Planificador inteligente de viajes</div>
      </div>
      <div style={{padding:16}}>
        {!viaje?(
          <div style={{...S.card,textAlign:"center",padding:36}}>
            <div style={{fontSize:54}}>🗺️</div>
            <div style={{fontSize:19,fontWeight:"bold",color:"var(--text)",marginTop:14}}>¡Planificá tu próximo viaje!</div>
            <div style={{color:"var(--text-soft)",fontSize:14,margin:"10px 0 16px"}}>Itinerario completo hora por hora con atracciones, restaurantes y hospedaje</div>
            {!apiKey?(
              <div style={{background:"#fffbeb",border:"1px solid #f6e05e",borderRadius:12,padding:14,marginBottom:14}}>
                <div style={{fontSize:14,fontWeight:"bold",color:"#744210"}}>⚙️ Primero configurá tu API Key</div>
                <button style={S.btn("#d69e2e")} onClick={()=>setTab("config")}>Ir a Configuración</button>
              </div>
            ):(
              <button style={S.btn("#2b6cb0")} onClick={onNuevo}>🗺️ Planificar nuevo viaje</button>
            )}
            {historial.length>0&&<button style={S.btn("#718096",true)} onClick={()=>setTab("historial")}>📋 Mis viajes ({historial.length})</button>}
          </div>
        ):(
          <>
            <div style={{...S.card,background:"linear-gradient(135deg,#1a365d,#2b6cb0)",color:"white",position:"relative"}}>
              {estado!=="viajando"&&<button onClick={onEditarViaje} aria-label="Editar datos del viaje" style={{position:"absolute",top:12,right:12,background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"4px 10px",color:"white",cursor:"pointer",fontSize:12,fontWeight:"bold"}}>✏️ Editar</button>}
              <div style={{fontSize:11,opacity:.8,textTransform:"uppercase",letterSpacing:1}}>{estado==="viajando"?"🚦 EN VIAJE":"✈️ VIAJE PLANIFICADO"}</div>
              <div style={{fontSize:20,fontWeight:"bold",marginTop:6}}>📍 {viaje.origen}</div>
              <div style={{fontSize:16,opacity:.9,marginTop:2}}>→ {viaje.destino}</div>
              {viaje.ruta&&<div style={{fontSize:12,opacity:.7,marginTop:4}}>🛣️ {viaje.ruta}</div>}
              <div style={{fontSize:12,opacity:.7,marginTop:2}}>👥 {viaje.pers} pers · Salida: {fmtDt(viaje.fRetiro)} · Devolución: {fmtDt(viaje.fDevol)}</div>
            </div>

            {estado==="viajando"&&(
              <>
                {alerta&&<div style={{background:"#fed7d7",border:"2px solid #e53e3e",borderRadius:12,padding:14,marginBottom:12,textAlign:"center"}}><div style={{fontWeight:"bold",color:"#c53030"}}>⚠️ ¡Menos de 3 horas para devolver!</div></div>}
                <div style={{...S.card,textAlign:"center"}}>
                  <div style={{fontSize:12,color:"var(--text-soft)"}}>⏱ Tiempo restante</div>
                  <div style={{fontSize:38,fontWeight:"bold",color:pct>80?"#e53e3e":"#2b6cb0",margin:"6px 0"}}>{tRest||"..."}</div>
                  <div style={{background:"#e2e8f0",borderRadius:8,height:10,overflow:"hidden"}}>
                    <div style={{background:pct>80?"#e53e3e":"#2b6cb0",height:"100%",width:`${pct}%`,borderRadius:8,transition:"width .5s"}}/>
                  </div>
                </div>
                {opcionSel?.dias&&<CardProximaParada opcionSel={opcionSel} completadas={completadas} onCompletar={onCompletar}/>}
                <button style={S.btn("#e53e3e",true)} onClick={onFinalizar}>✅ Finalizar y guardar en historial</button>
              </>
            )}

            {clima&&estado!=="viajando"&&<CardClima clima={clima} viaje={viaje}/>}
            {estado!=="viajando"&&<CardEquipaje equipaje={equipaje} setEquipaje={setEquipaje}/>}

            {loadingIA&&<div style={{...S.card,textAlign:"center",padding:32,background:"#ebf8ff"}}><div style={{fontSize:44,animation:"spin 1s linear infinite"}}>🤖</div><div style={{fontWeight:"bold",color:"#2b6cb0",marginTop:14}}>Analizando tu ruta... (puede tardar unos segundos más si hay mucha demanda)</div></div>}

            {iaError&&!loadingIA&&<div style={{...S.card,background:"#fff5f5",border:"1px solid #feb2b2"}}><div style={{fontWeight:"bold",color:"#c53030",marginBottom:6}}>❌ Error de IA</div><div style={{fontSize:13,color:"#4a5568",marginBottom:8}}>{iaError}</div><button style={S.btn("#e53e3e",true)} onClick={onReintentar}>🔄 Reintentar</button></div>}

            {!loadingIA&&!iaError&&(!opciones||opciones.length===0)&&estado!=="viajando"&&(
              <div style={{...S.card,textAlign:"center",padding:20,background:"#fffbeb",border:"1.5px solid #f6e05e"}}>
                <div style={{fontSize:36}}>🤖</div>
                <div style={{fontWeight:"bold",color:"#744210",marginTop:8}}>Generá tus opciones de viaje</div>
                <button style={S.btn("#d69e2e")} onClick={onReintentar}>🔍 Generar con IA</button>
              </div>
            )}

            {!loadingIA&&!iaError&&opciones?.length>0&&estado!=="viajando"&&(
              <div style={{...S.card,background:"#f0fff4",border:"1.5px solid #68d391"}}>
                <div style={{fontWeight:"bold",color:"#276749",fontSize:15,marginBottom:4}}>✅ ¡3 opciones listas!</div>
                {opcionSel?.dias&&<div style={{fontSize:13,color:"#2b6cb0",marginTop:4,fontWeight:"bold"}}>📌 Itinerario: {opcionSel.nombre}</div>}
                <button style={S.btn("#38a169")} onClick={()=>setTab("opciones")}>🗂️ Ver opciones</button>
                {opcionSel?.dias&&<button style={S.btn("#25d366",true)} onClick={onCompartir}>📲 Compartir por WhatsApp</button>}
              </div>
            )}

            {opcionSel?.dias&&estado==="listo"&&(
              <div style={{...S.card,textAlign:"center",background:"#f0fff4",border:"2px solid #38a169"}}>
                <div style={{fontSize:36}}>🚦</div>
                <div style={{fontWeight:"bold",color:"#276749",fontSize:16,marginTop:8}}>¡Todo listo!</div>
                <div style={{fontSize:12,color:"#e53e3e",margin:"6px 0"}}>⚠️ Volver antes de: {calcHoraLimite(viaje.fDevol,viaje.buffer)}</div>
                <button style={S.btn("#38a169")} onClick={onIniciar}>🚗 Iniciar Viaje</button>
              </div>
            )}

            <button style={S.btn("#2b6cb0",true)} onClick={onNuevo}>+ Nuevo viaje</button>
          </>
        )}
      </div>
    </div>
  );
}

function PantallaOpciones({opciones,opcionSel,loadingIA,viaje,setTab,generarItinerario,loadingDetalle,generandoIdx,progresoDia,onEliminarParada,onEditarParada,onMoverParada,onAbrirAgregarParada,onCompartir}){
  const [expandido,setExpandido]=useState(null);
  if(!viaje) return(<div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div></div><div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:36}}><div style={{fontSize:48}}>🗂️</div><div style={{color:"var(--text-soft)",marginTop:8}}>Creá un viaje en 🏠 Inicio</div></div></div></div>);
  if(loadingIA) return(<div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div></div><div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:32}}><div style={{fontSize:44,animation:"spin 1s linear infinite"}}>🤖</div><div style={{fontWeight:"bold",marginTop:12}}>Generando...</div></div></div></div>);
  if(!opciones?.length) return(<div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div></div><div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:32}}><div style={{fontSize:44}}>🗂️</div><div style={{fontWeight:"bold",marginTop:10}}>Sin opciones</div><div style={{fontSize:13,color:"var(--text-soft)",marginTop:6}}>Generá en 🏠 Inicio</div></div></div></div>);
  const cols=["#2b6cb0","#38a169","#805ad5"];
  return(
    <div>
      <div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div><div style={{fontSize:13,opacity:.8}}>{viaje.origen} → {viaje.destino}</div></div>
      <div style={{padding:16}}>
        {opciones.map((op,oi)=>{
          const sel=opcionSel?.nombre===op.nombre&&opcionSel?.dias;
          const c=cols[oi]||"#2b6cb0";
          const abierto=expandido===oi;
          const generandoEsta=loadingDetalle&&generandoIdx===oi;
          return(
            <div key={oi} style={{...S.card,border:`2px solid ${sel?c:"var(--border)"}`,background:sel?`${c}06`:"var(--card-bg)",marginBottom:16}}>
              <div onClick={()=>setExpandido(abierto?null:oi)} style={{cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{fontWeight:"bold",fontSize:16,color:c}}>Opción {oi+1}: {op.nombre}</div>
                    <div style={{fontSize:13,color:"var(--text)",marginTop:2}}>{op.descripcion}</div>
                  </div>
                  <span style={{fontSize:18,color:"#a0aec0"}}>{abierto?"▲":"▼"}</span>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {op.totalKm&&<span style={S.bdg(c)}>📏 {op.totalKm} km</span>}
                  <span style={S.bdg("#718096")}>🎨 {op.estilo}</span>
                </div>
              </div>
              {abierto&&!sel&&(
                <div style={{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:12}} className="fade-in">
                  {op.resumen&&<div style={{fontSize:13,color:"var(--text)",marginBottom:10,lineHeight:1.4}}>{op.resumen}</div>}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <div style={{background:"#f7fafc",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                      <div style={{fontSize:11,color:"#718096"}}>📏 Distancia</div>
                      <div style={{fontSize:15,fontWeight:"bold",color:"#2d3748"}}>{op.km||"?"} km</div>
                    </div>
                    <div style={{background:"#f7fafc",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                      <div style={{fontSize:11,color:"#718096"}}>🚗 Manejo</div>
                      <div style={{fontSize:15,fontWeight:"bold",color:"#2d3748"}}>{op.tiempoManejo||"?"}</div>
                    </div>
                    <div style={{background:"#ebf8ff",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                      <div style={{fontSize:11,color:"#718096"}}>⏱️ Total estimado</div>
                      <div style={{fontSize:15,fontWeight:"bold",color:"#2b6cb0"}}>{op.tiempoTotal||"?"}</div>
                    </div>
                    <div style={{background:"#f0fff4",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                      <div style={{fontSize:11,color:"#718096"}}>✅ Ventaja</div>
                      <div style={{fontSize:12,fontWeight:"bold",color:"#276749"}}>{op.ventaja||"—"}</div>
                    </div>
                  </div>
                  {op.rutasUsadas?.length>0&&(
                    <div style={{marginBottom:8}}>
                      <span style={{fontSize:12,color:"#718096",fontWeight:"bold"}}>🛣️ Rutas: </span>
                      {op.rutasUsadas.map((r,i)=>(<span key={i} style={{background:"#e2e8f0",color:"#4a5568",borderRadius:6,padding:"2px 8px",fontSize:12,marginRight:4}}>{r}</span>))}
                    </div>
                  )}
                  {op.lugaresEnRuta?.length>0&&(
                    <div>
                      <div style={{fontSize:12,color:"#718096",fontWeight:"bold",marginBottom:6}}>⭐ Lugares en esta ruta:</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {op.lugaresEnRuta.map((l,i)=>(<span key={i} style={{background:"#0bc5ea18",color:"#0987a0",borderRadius:8,padding:"3px 10px",fontSize:12}}>📍 {l}</span>))}
                      </div>
                    </div>
                  )}
                  <div style={{marginTop:12,padding:10,background:"#fffbeb",borderRadius:10,fontSize:12,color:"#744210"}}>
                    💡 Al elegir esta ruta, la IA genera la hoja de ruta completa día por día: descansos, dónde cargar combustible, lugares para conocer y el detalle en el mapa. Los nombres de hoteles/restaurantes/precios son sugerencias y conviene verificarlos.
                  </div>
                </div>
              )}
              {sel&&opcionSel.dias&&abierto&&(
                <div style={{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:12}} className="fade-in">
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    <button onClick={onCompartir} style={{...S.btn("#25d366",true),flex:1,marginTop:0,padding:"8px",fontSize:13}}>📲 WhatsApp</button>
                    <button onClick={()=>onAbrirAgregarParada()} style={{...S.btn("#38a169",true),flex:1,marginTop:0,padding:"8px",fontSize:13}}>➕ Agregar parada</button>
                  </div>
                  {opcionSel.dias.map((dia,di)=>(
                    <div key={di} style={{marginBottom:16}}>
                      <div style={{fontWeight:"bold",color:"white",background:c,borderRadius:10,padding:"8px 14px",marginBottom:12,fontSize:14,display:"flex",justifyContent:"space-between"}}>
                        <span>📅 Día {dia.dia}: {dia.titulo}</span>
                        {dia.kmDelDia&&<span style={{fontSize:12,opacity:.85}}>📏 {dia.kmDelDia} km</span>}
                      </div>
                      {dia.paradas?.map((p,pi)=>(<Parada key={pi} p={p} isFirst={pi===0} isLast={pi===dia.paradas.length-1} clave={`${di}-${pi}`} onEliminar={onEliminarParada} onEditar={onEditarParada} onMover={onMoverParada}/>))}
                    </div>
                  ))}
                </div>
              )}
              <button style={S.btn(c,false)} onClick={()=>generarItinerario(op,oi)} disabled={loadingDetalle}>
                {generandoEsta?`⏳ Generando día ${progresoDia?.actual||1}/${progresoDia?.total||"?"}...`:sel?"🔄 Regenerar itinerario":"🗺️ Elegir y generar itinerario"}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PantallaMapa({viaje,opcionSel,posGPS,estado}){
  const paradas=opcionSel?.dias?.flatMap(d=>d.paradas||[])||[];
  // índice global para numerar igual que el mapa (solo cuentan las que tienen coords válidas)
  let numGlobal=0;
  const conNum=opcionSel?.dias?.map(d=>({
    ...d,
    paradas:(d.paradas||[]).map(p=>{
      const valida=p.lat&&p.lng&&p.lat>=-55&&p.lat<=-21&&p.lng>=-73&&p.lng<=-53;
      return {...p,_num:valida?++numGlobal:null};
    })
  }))||[];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 72px)"}}>
      <div style={{...S.hdr("#e53e3e"),padding:"12px 20px 10px"}}><div style={{fontSize:19,fontWeight:"bold"}}>🗺️ Mapa e Itinerario</div><div style={{fontSize:12,opacity:.8}}>{opcionSel?.nombre||"Elegí una opción"}</div></div>
      {!viaje&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,color:"#a0aec0"}}><div style={{fontSize:48}}>🗺️</div><div style={{marginTop:10}}>Creá un viaje en 🏠</div></div>}
      {viaje&&!opcionSel?.dias&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,color:"#a0aec0",textAlign:"center",padding:20}}><div style={{fontSize:48}}>🗂️</div><div style={{marginTop:10,color:"#4a5568"}}>Elegí una opción en 🗂️</div></div>}
      {viaje&&opcionSel?.dias&&(
        <>
          {/* Mapa */}
          <div style={{height:"40%",minHeight:220,position:"relative",borderBottom:"3px solid #e53e3e"}}>
            <MapaLeaflet paradas={paradas} posGPS={posGPS}/>
          </div>
          {/* Itinerario detallado */}
          <div style={{flex:1,overflowY:"auto",background:"#f7fafc",padding:"10px 12px"}}>
            <div style={{background:"#fffbeb",border:"1px solid #f6e05e",borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#744210"}}>
              ⚠️ Hospedajes, restaurantes y precios son sugerencias generadas por IA. Verificá disponibilidad y precio real antes de reservar.
            </div>
            {opcionSel.presupuesto&&(
              <div style={{background:"white",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 1px 6px rgba(0,0,0,0.08)",border:"2px solid #d69e2e"}}>
                <div style={{fontWeight:"bold",color:"#2d3748",fontSize:14,marginBottom:10}}>💰 Presupuesto estimado del viaje</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#fef5f5",borderRadius:8}}><span style={{fontSize:12,color:"#718096"}}>⛽ Combustible</span><span style={{fontSize:13,fontWeight:"bold",color:"#e53e3e"}}>{fmtM(opcionSel.presupuesto.combustible)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#ebf8ff",borderRadius:8}}><span style={{fontSize:12,color:"#718096"}}>🏨 Alojamiento</span><span style={{fontSize:13,fontWeight:"bold",color:"#3182ce"}}>{fmtM(opcionSel.presupuesto.alojamiento)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#fffaf0",borderRadius:8}}><span style={{fontSize:12,color:"#718096"}}>🍽️ Comida</span><span style={{fontSize:13,fontWeight:"bold",color:"#ed8936"}}>{fmtM(opcionSel.presupuesto.comida)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#f0fff4",borderRadius:8}}><span style={{fontSize:12,color:"#718096"}}>🎫 Extras</span><span style={{fontSize:13,fontWeight:"bold",color:"#38a169"}}>{fmtM(opcionSel.presupuesto.extras)}</span></div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:"2px solid #f4f4f4"}}>
                  <span style={{fontSize:14,fontWeight:"bold",color:"#2d3748"}}>Total estimado</span>
                  <span style={{fontSize:20,fontWeight:"bold",color:"#d69e2e"}}>{fmtM(opcionSel.presupuesto.total)}</span>
                </div>
                {viaje.pers>1&&<div style={{display:"flex",justifyContent:"space-between",paddingTop:6,fontSize:12,color:"#718096"}}><span>Por persona ({viaje.pers})</span><span style={{fontWeight:"bold"}}>{fmtM(Math.ceil(opcionSel.presupuesto.total/viaje.pers))}</span></div>}
                {opcionSel.presupuesto.detalle&&<div style={{fontSize:11,color:"#a0aec0",marginTop:6,fontStyle:"italic"}}>{opcionSel.presupuesto.detalle}</div>}
              </div>
            )}
            <div style={{fontSize:12,color:"#718096",textAlign:"center",marginBottom:8}}>📍 Tocá una parada para verla en el mapa · Los números coinciden con el mapa</div>
            {conNum.map((dia,di)=>(
              <div key={di} style={{marginBottom:14}}>
                <div style={{fontWeight:"bold",color:"white",background:"#2b6cb0",borderRadius:10,padding:"8px 14px",marginBottom:8,fontSize:13,display:"flex",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
                  <span>📅 Día {dia.dia}: {dia.titulo}</span>
                  {dia.kmDelDia?<span style={{fontSize:11,opacity:.85}}>📏 {dia.kmDelDia} km</span>:null}
                </div>
                {dia.paradas.map((p,pi)=>{
                  const t=TIPOS[p.tipo]||TIPOS.turistico;
                  return(
                    <div key={pi} onClick={()=>p.lat&&p.lng&&window._centrarMapa(p.lat,p.lng)}
                      style={{display:"flex",gap:10,background:"white",borderRadius:12,padding:"10px 12px",marginBottom:6,cursor:p.lat?"pointer":"default",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",borderLeft:`4px solid ${t.color}`}}>
                      <div style={{position:"relative",flexShrink:0}}>
                        <div style={{background:t.color,color:"white",borderRadius:"50%",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{t.icon}</div>
                        {p._num&&<div style={{position:"absolute",top:-4,right:-4,background:"#1a202c",color:"white",borderRadius:"50%",minWidth:16,height:16,fontSize:9,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",border:"1.5px solid white"}}>{p._num}</div>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",gap:6,flexWrap:"wrap"}}>
                          <span style={{fontWeight:"bold",color:"#2d3748",fontSize:13}}>{p.nombre}</span>
                          {p.horaLlegada&&<span style={{background:`${t.color}18`,color:t.color,borderRadius:6,padding:"1px 7px",fontSize:11,fontWeight:"bold",whiteSpace:"nowrap"}}>🕐 {p.horaLlegada}{p.horaSalida?` → ${p.horaSalida}`:""}</span>}
                        </div>
                        <div style={{fontSize:11,color:"#718096",marginTop:2}}>
                          {t.label}
                          {p.duracion?` · ⏳ ${p.duracion}`:""}
                          {p.kmDesdeAnterior?` · 📏 ${p.kmDesdeAnterior}`:""}
                          {p.tiempoManejo?` · 🚗 ${p.tiempoManejo}`:""}
                        </div>
                        {p.descripcion&&<div style={{fontSize:12,color:"#4a5568",marginTop:3,lineHeight:1.35}}>{p.descripcion}</div>}
                        {(p.alojamientos?.length>0||p.restaurantes?.length>0)&&(
                          <div style={{fontSize:11,color:"#2b6cb0",marginTop:3,fontWeight:"bold"}}>
                            {p.alojamientos?.length>0?`🏨 ${p.alojamientos.length} hospedajes`:""}
                            {p.alojamientos?.length>0&&p.restaurantes?.length>0?" · ":""}
                            {p.restaurantes?.length>0?`🍽️ ${p.restaurantes.length} restaurantes`:""}
                            <span style={{color:"#a0aec0",fontWeight:"normal"}}> — tocá el marcador en el mapa</span>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────
function App(){

  const [completadas,setCompletadas]=useState(()=>LS.get("completadas",[]));
  const [darkMode,setDarkMode]=useState(()=>LS.get("darkMode",false));
  const [equipaje,setEquipaje]=useState(()=>LS.get("equipaje",[
    {id:1,texto:"📄 DNI y registro de conducir",ok:false},
    {id:2,texto:"💳 Tarjetas y efectivo",ok:false},
    {id:3,texto:"🔌 Cargadores de celular",ok:false},
    {id:4,texto:"🧉 Mate, termo y yerba",ok:false},
    {id:5,texto:"💊 Botiquín básico",ok:false},
    {id:6,texto:"🧥 Abrigo",ok:false},
    {id:7,texto:"🕶️ Lentes de sol",ok:false},
    {id:8,texto:"💧 Agua para el viaje",ok:false},
  ]));
  const [clima,setClima]=useState(null);
  const [loadingIA,setLoadingIA]=useState(false);
  const [loadingDetalle,setLoadingDetalle]=useState(false);
  const [generandoIdx,setGenerandoIdx]=useState(null);
  const [progresoDia,setProgresoDia]=useState(null);
  const [iaError,setIaError]=useState("");
  const [modal,setModal]=useState(null);
  const [posGPS,setPosGPS]=useState(null);
  const [tRest,setTRest]=useState("");
  const [pct,setPct]=useState(0);
  const [inicioR,setInicioR]=useState(()=>{const v=LS.get("inicioR");return v?new Date(v):null;});
  const [notif3h,setNotif3h]=useState(false);
  const [fV,setFV]=useState({origen:"",destino:"",ruta:"",auto:"",fRetiro:"",fDevol:"",pers:"2",buffer:3,notas:""});
  const [fG,setFG]=useState({cat:"nafta",desc:"",monto:""});
  const [fN,setFN]=useState({km:"",rend:"12",precio:""});
  const [fEP,setFEP]=useState({nombre:"",tipo:"turistico",horaLlegada:"",horaSalida:"",descripcion:"",duracion:"",clave:null});

  useEffect(()=>LS.set("viaje",viaje),[viaje]);
  useEffect(()=>LS.set("estado",estado),[estado]);
  useEffect(()=>LS.set("opciones",opciones),[opciones]);
  useEffect(()=>LS.set("opcionSel",opcionSel),[opcionSel]);
  useEffect(()=>LS.set("gastos",gastos),[gastos]);
  useEffect(()=>LS.set("pers",pers),[pers]);
  useEffect(()=>LS.set("historial",historial),[historial]);
  useEffect(()=>LS.set("completadas",completadas),[completadas]);
  useEffect(()=>LS.set("equipaje",equipaje),[equipaje]);
  useEffect(()=>{if(inicioR)LS.set("inicioR",inicioR.toISOString());},[inicioR]);
  useEffect(()=>{document.documentElement.setAttribute("data-theme",darkMode?"dark":"light");LS.set("darkMode",darkMode);},[darkMode]);
  useEffect(()=>{
    if(tab==="mapa"){
      [100,400,900].forEach(ms=>setTimeout(()=>{
        if(_map){_map.invalidateSize();if(_lastBounds&&_lastBounds.length)_map.fitBounds(_lastBounds,{padding:[40,40],maxZoom:11});}
      },ms));
    }
  },[tab]);

  // Clima al crear viaje
  useEffect(()=>{
    if(!viaje?.destino) {setClima(null);return;}
    (async()=>{
      const coord=await geocodeNominatim(viaje.destino+", Argentina");
      if(coord){
        const c=await getClima(coord.lat,coord.lng,viaje.fRetiro,viaje.fDevol);
        if(c) setClima(c);
      }
    })();
  },[viaje?.id]);

  // Countdown + notificación
  useEffect(()=>{
    if(estado!=="viajando"||!viaje) return;
    const calc=()=>{
      const now=new Date(),dev=new Date(viaje.fDevol),ini=inicioR||now;
      const diff=dev-now,total=dev-ini,usado=now-ini;
      setPct(Math.min(100,Math.max(0,Math.round((usado/total)*100))));
      if(diff<=0){setTRest("¡Tiempo vencido!");return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
      setTRest(`${d}d ${h}h ${m}m`);
      // Notificación a las 3 horas
      if(diff<3*3600000&&!notif3h&&"Notification" in window&&Notification.permission==="granted"){
        new Notification("⚠️ ViajeFácil",{body:"Quedan menos de 3 horas para devolver el auto. ¡Emprendé el regreso!",icon:"icon-192.png"});
        setNotif3h(true);
      }
    };
    calc();
    const iv=setInterval(calc,30000);
    return()=>clearInterval(iv);
  },[estado,viaje,inicioR,notif3h]);

  const alerta=estado==="viajando"&&viaje&&(()=>{const d=new Date(viaje.fDevol)-new Date();return d>0&&d<3*3600000;})();

  const crearViaje=()=>{
    if(!fV.origen||!fV.destino||!fV.fRetiro||!fV.fDevol) return;
    const v={id:Date.now(),...fV,pers:parseInt(fV.pers)||2,buffer:parseInt(fV.buffer)||3};
    setViaje(v);setOpciones([]);setOpcionSel(null);setGastos([]);setCompletadas([]);
    setEstado("planificando");setInicioR(null);setIaError("");setNotif3h(false);
    LS.del("inicioR");setModal(null);
    setFV({origen:"",destino:"",ruta:"",auto:"",fRetiro:"",fDevol:"",pers:"2",buffer:3,notas:""});
    setTab("inicio");
    setTimeout(()=>buscarIA(v),200);
  };

  const abrirEditarViaje=()=>{
    if(!viaje) return;
    setFV({origen:viaje.origen||"",destino:viaje.destino||"",ruta:viaje.ruta||"",auto:viaje.auto||"",fRetiro:viaje.fRetiro||"",fDevol:viaje.fDevol||"",pers:String(viaje.pers||2),buffer:viaje.buffer||3,notas:viaje.notas||""});
    setModal("editarViaje");
  };

  const guardarEdicionViaje=()=>{
    if(!fV.origen||!fV.destino||!fV.fRetiro||!fV.fDevol) return;
    setViaje(v=>({...v,...fV,pers:parseInt(fV.pers)||2,buffer:parseInt(fV.buffer)||3}));
    setModal(null);
  };

  const buscarIA=async(viajeData)=>{
    const v=viajeData||viaje;
    if(!v||!apiKey){setIaError("Configurá tu API Key en ⚙️");return;}
    setLoadingIA(true);setOpciones([]);setIaError("");
    const horaLimite=calcHoraLimite(v.fDevol,v.buffer);
    try{
      const data=await callGroq(apiKey,[
        {role:"system",content:"Sos un experto en turismo argentino. Respondes solo JSON valido."},
        {role:"user",content:`Planificacion de viaje EFICIENTE en auto: ${v.origen} → ${v.destino}. Ruta preferida del usuario: ${v.ruta||"a definir por vos"}. ${v.pers} personas. Salida: ${fmtHora(v.fRetiro)}. LIMITE de regreso a ${v.origen}: ${horaLimite}.${v.notas?" Preferencias: "+v.notas:""}

Sos un planificador de rutas experto en el NOA argentino. El objetivo es que el viaje sea EFICIENTE y SEGURO (lo que Google Maps no calcula: descansos, combustible, paradas para conocer sin desviarse).

Dame 3 OPCIONES DE RUTA realmente distintas para ir de ${v.origen} a ${v.destino}. Cada opcion usa un camino diferente (ej: una rapida por autopista, una panoramica por cuesta, una mixta con mas pueblos). Usa numeros de ruta REALES (RN9, RN34, RN66, etc).

Para cada opcion calcula:
- distancia total real en km
- tiempo de manejo puro (velocidades permitidas: autopista 110-120, ruta 80-110, montaña 40-60)
- tiempo total estimado SUMANDO descansos y paradas cortas
- ventaja principal de esa ruta

JSON: {"opciones":[{"nombre":"Ruta rapida","resumen":"por que conviene","rutasUsadas":["RN9"],"km":280,"tiempoManejo":"3h 30m","tiempoTotal":"5h","lugaresEnRuta":["lugar1","lugar2"],"ventaja":"la mas rapida y segura"},{"nombre":"Ruta panoramica","resumen":"...","rutasUsadas":["RN9 cuesta"],"km":310,"tiempoManejo":"4h","tiempoTotal":"6h","lugaresEnRuta":["lugar1","lugar2","lugar3"],"ventaja":"mejores paisajes"},{"nombre":"Ruta con mas paradas","resumen":"...","rutasUsadas":["RN9","RN34"],"km":300,"tiempoManejo":"4h","tiempoTotal":"7h","lugaresEnRuta":["lugar1","lugar2","lugar3","lugar4"],"ventaja":"mas lugares para conocer"}]}`}
      ],2000,0.4);
      let parsed;
      try{
        parsed=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,""));
      }catch{
        throw new Error("La IA devolvió un formato inválido. Probá reintentar.");
      }
      if(!parsed.opciones?.length) throw new Error("La IA no devolvió opciones. Probá reintentar o revisar tu API Key.");
      setOpciones(parsed.opciones);
      setEstado("listo");
      setTab("opciones");
    }catch(e){setIaError(e.message||"Error. Verificá tu API Key.");}
    setLoadingIA(false);
  };

  // Genera UN día del itinerario (llamada liviana, evita el tope de tokens de Groq)
  const generarDia=async(opcion,diaNum,totalDias,contextoPrevio)=>{
    const horaLimite=calcHoraLimite(viaje.fDevol,viaje.buffer);
    const esUltimo=diaNum===totalDias;
    const esPrimero=diaNum===1;
    const inicioTxt=esPrimero
      ?`Es el primer día. Sale de ${viaje.origen} a las ${fmtHora(viaje.fRetiro)}.`
      :`Continúa desde donde terminó el día anterior: ${contextoPrevio?.nombre||viaje.origen}${contextoPrevio?.hora?` (aprox ${contextoPrevio.hora})`:""}, siguiendo rumbo a ${viaje.destino}.`;
    const finTxt=esUltimo
      ?`Es el ÚLTIMO día del viaje: debe terminar llegando a ${viaje.origen} antes de ${horaLimite} (dejar margen para lavar y entregar el auto).`
      :`No es el último día, puede terminar en una localidad intermedia razonable rumbo a ${viaje.destino}.`;
    const data=await callGroq(apiKey,[
      {role:"system",content:"Sos un guia turistico local experto en Argentina. Respondes solo JSON valido y compacto."},
      {role:"user",content:`Planificá SOLO el día ${diaNum} de ${totalDias} de un viaje en auto: "${opcion.nombre}" (${viaje.origen} → ${viaje.destino}, rutas: ${opcion.rutasUsadas?.join(", ")||viaje.ruta}).
${inicioTxt} ${finTxt}
${viaje.pers} personas.${viaje.notas?" Preferencias: "+viaje.notas:""}

Reglas: coherencia geográfica (avanzar siempre hacia ${viaje.destino}, nunca retroceder); velocidades reales (autopista 110-120, ruta 80-110, montaña 40-60); indicar kmDesdeAnterior y tiempoManejo por tramo; descanso cada ~2hs de manejo; parada de combustible antes de quedarse sin nafta; comidas en horario real (desayuno 8h, almuerzo 13h, merienda 17h, cena 21h) con 3 restaurantes reales y conocidos de menor a mayor precio; si el día termina en algún lugar, agregar parada "dormir" con 3 alojamientos reales de menor a mayor precio; descripciones BREVES (1 línea); lat/lng reales de Argentina.
Tipos: origen, ruta, descanso, comida, turistico, mirador, dormir, destino

JSON: {"titulo":"str","kmDelDia":0,"presupuestoDia":{"combustible":0,"alojamiento":0,"comida":0,"extras":0},"paradas":[{"nombre":"str","tipo":"str","descripcion":"str breve","horaLlegada":"HH:MM","horaSalida":"HH:MM","duracion":"str","kmDesdeAnterior":"str","tiempoManejo":"str","lat":-26.8,"lng":-65.2,"alojamientos":[],"restaurantes":[]}]}`}
    ],2400,0.3);
    let parsed;
    try{
      parsed=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,""));
    }catch{
      throw new Error(`El día ${diaNum} devolvió un formato inválido. Probá regenerar.`);
    }
    if(!parsed.paradas?.length) throw new Error(`El día ${diaNum} no incluyó paradas.`);
    return parsed;
  };

  const generarItinerario=async(opcion,oi)=>{
    if(!viaje||!apiKey) return;
    setLoadingDetalle(true);setGenerandoIdx(oi??null);
    const totalDias=calcDias(viaje.fRetiro,viaje.fDevol);
    const esAR=(lat,lng)=>lat&&lng&&lat>=-55&&lat<=-21&&lng>=-73&&lng<=-53;
    try{
      const diasResultado=[];
      let contextoPrevio=null;
      const presTotal={combustible:0,alojamiento:0,comida:0,extras:0,total:0};
      for(let d=1;d<=totalDias;d++){
        setProgresoDia({actual:d,total:totalDias});
        const parsedDia=await generarDia(opcion,d,totalDias,contextoPrevio);
        for(const p of parsedDia.paradas){
          if(!esAR(p.lat,p.lng)){
            const coord=await geocodeNominatim(p.nombre+", Argentina");
            if(coord){p.lat=coord.lat;p.lng=coord.lng;}
            await sleep(1100); // respetar límite de 1 req/seg de Nominatim
          }
        }
        diasResultado.push({dia:d,titulo:parsedDia.titulo||`Día ${d}`,kmDelDia:parsedDia.kmDelDia||0,paradas:parsedDia.paradas});
        const pd=parsedDia.presupuestoDia||{};
        presTotal.combustible+=pd.combustible||0;
        presTotal.alojamiento+=pd.alojamiento||0;
        presTotal.comida+=pd.comida||0;
        presTotal.extras+=pd.extras||0;
        const ultima=parsedDia.paradas[parsedDia.paradas.length-1];
        contextoPrevio={nombre:ultima?.nombre,hora:ultima?.horaSalida||ultima?.horaLlegada};
      }
      presTotal.total=presTotal.combustible+presTotal.alojamiento+presTotal.comida+presTotal.extras;
      const completa={...opcion,dias:diasResultado,presupuesto:presTotal};
      setOpcionSel(completa);
      LS.set("opcionSel",completa);
      setCompletadas([]);
      setTab("mapa");
    }catch(e){alert("Error: "+e.message);}
    setLoadingDetalle(false);setGenerandoIdx(null);setProgresoDia(null);
  };

  const iniciarViaje=()=>{
    setInicioR(new Date());setEstado("viajando");setNotif3h(false);
    if("Notification" in window&&Notification.permission==="default") Notification.requestPermission();
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(
        pos=>setPosGPS({lat:pos.coords.latitude,lng:pos.coords.longitude}),
        e=>console.log("GPS:",e),{enableHighAccuracy:true,maximumAge:30000}
      );
    }
    setTab("inicio");
  };

  const finalizarViaje=()=>{
    if(!viaje) return;
    const reg={id:Date.now(),fechaFin:new Date().toISOString(),viaje,opciones,opcionSel,gastos,pers};
    setHistorial(prev=>[...prev,reg]);
    setViaje(null);setOpciones([]);setOpcionSel(null);setGastos([]);setCompletadas([]);
    setEstado("nuevo");setInicioR(null);setIaError("");setClima(null);
    ["viaje","opciones","opcionSel","gastos","estado","inicioR","completadas"].forEach(k=>LS.del(k));
    setTab("historial");
  };

  const compartirWhatsApp=()=>{
    if(!opcionSel?.dias||!viaje) return;
    let txt=`🚗 *ViajeFácil* — ${viaje.origen} → ${viaje.destino}\n`;
    txt+=`📅 Salida: ${fmtDt(viaje.fRetiro)}\n⏰ Devolución: ${fmtDt(viaje.fDevol)}\n👥 ${viaje.pers} personas\n\n`;
    opcionSel.dias.forEach(d=>{
      txt+=`*📅 Día ${d.dia}: ${d.titulo}*\n`;
      d.paradas?.forEach(p=>{
        const t=TIPOS[p.tipo]||TIPOS.turistico;
        txt+=`${t.icon} ${p.horaLlegada||""} — ${p.nombre}\n`;
      });
      txt+=`\n`;
    });
    txt+=`_Generado con ViajeFácil — hospedajes/restaurantes/precios son sugerencias de IA, verificar antes de reservar_`;
    window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");
  };

  const eliminarParada=(clave)=>{
    if(!opcionSel?.dias) return;
    const [di,pi]=clave.split("-").map(Number);
    const nueva={...opcionSel,dias:opcionSel.dias.map((d,i)=>i!==di?d:{...d,paradas:d.paradas.filter((_,j)=>j!==pi)})};
    setOpcionSel(nueva);
    LS.set("opcionSel",nueva);
  };

  const agregarParada=(parada,diaIndex)=>{
    if(!opcionSel?.dias) return;
    const idx=(diaIndex==null||diaIndex<0||diaIndex>=opcionSel.dias.length)?opcionSel.dias.length-1:diaIndex;
    const nueva={...opcionSel,dias:opcionSel.dias.map((d,i)=>i!==idx?d:{...d,paradas:[...(d.paradas||[]),parada]})};
    setOpcionSel(nueva);
    LS.set("opcionSel",nueva);
    setModal(null);
  };

  const abrirEditarParada=(clave)=>{
    if(!opcionSel?.dias) return;
    const [di,pi]=clave.split("-").map(Number);
    const p=opcionSel.dias[di]?.paradas?.[pi];
    if(!p) return;
    setFEP({nombre:p.nombre||"",tipo:p.tipo||"turistico",horaLlegada:p.horaLlegada||"",horaSalida:p.horaSalida||"",descripcion:p.descripcion||"",duracion:p.duracion||"",clave});
    setModal("editarParada");
  };

  const guardarEdicionParada=()=>{
    if(!opcionSel?.dias||!fEP.clave) return;
    const [di,pi]=fEP.clave.split("-").map(Number);
    const nueva={...opcionSel,dias:opcionSel.dias.map((d,i)=>i!==di?d:{...d,paradas:d.paradas.map((p,j)=>j!==pi?p:{...p,nombre:fEP.nombre,tipo:fEP.tipo,horaLlegada:fEP.horaLlegada,horaSalida:fEP.horaSalida,descripcion:fEP.descripcion,duracion:fEP.duracion})})};
    setOpcionSel(nueva);
    LS.set("opcionSel",nueva);
    setModal(null);
  };

  const moverParada=(clave,dir)=>{
    if(!opcionSel?.dias) return;
    const [di,pi]=clave.split("-").map(Number);
    const dia=opcionSel.dias[di];
    const nj=pi+dir;
    if(!dia||nj<0||nj>=dia.paradas.length) return;
    const paradas=[...dia.paradas];
    [paradas[pi],paradas[nj]]=[paradas[nj],paradas[pi]];
    const nueva={...opcionSel,dias:opcionSel.dias.map((d,i)=>i!==di?d:{...d,paradas})};
    setOpcionSel(nueva);
    LS.set("opcionSel",nueva);
  };

  const completarParada=(clave)=>{
    setCompletadas(p=>[...p,clave]);
  };

  const agregarGasto=()=>{
    if(!fG.monto) return;
    setGastos(p=>[...p,{id:Date.now(),cat:fG.cat,desc:fG.desc,monto:parseFloat(fG.monto),fecha:new Date().toLocaleDateString("es-AR")}]);
    setModal(null);setFG({cat:"nafta",desc:"",monto:""});
  };

  return(
    <div style={S.app} className="app-frame">
      <div style={{display:tab==="mapa"?"block":"none",height:"calc(100vh - 72px)"}}>
        <PantallaMapa viaje={viaje} opcionSel={opcionSel} posGPS={posGPS} estado={estado}/>
      </div>
      {tab==="inicio"    &&<PantallaInicio viaje={viaje} estado={estado} opciones={opciones} loadingIA={loadingIA} iaError={iaError} apiKey={apiKey} tRest={tRest} pct={pct} alerta={alerta} opcionSel={opcionSel} historial={historial} clima={clima} equipaje={equipaje} setEquipaje={setEquipaje} completadas={completadas} onCompletar={completarParada} onNuevo={()=>setModal("viaje")} onEditarViaje={abrirEditarViaje} onIniciar={iniciarViaje} onFinalizar={finalizarViaje} onCompartir={compartirWhatsApp} setTab={setTab} onReintentar={()=>buscarIA(viaje)}/>}
      {tab==="opciones"  &&<PantallaOpciones opciones={opciones} opcionSel={opcionSel} loadingIA={loadingIA} viaje={viaje} setTab={setTab} generarItinerario={generarItinerario} loadingDetalle={loadingDetalle} generandoIdx={generandoIdx} progresoDia={progresoDia} onEliminarParada={eliminarParada} onEditarParada={abrirEditarParada} onMoverParada={moverParada} onAbrirAgregarParada={()=>setModal("parada")} onCompartir={compartirWhatsApp}/>}
      {tab==="gastos"    &&<PantallaGastos gastos={gastos} setGastos={setGastos} pers={pers} setPers={setPers} setModal={setModal}/>}
      {tab==="historial" &&<PantallaHistorial historial={historial} onEliminar={id=>setHistorial(p=>p.filter(h=>h.id!==id))}/>}
      {tab==="config"    &&<PantallaConfig apiKey={apiKey} setApiKey={setApiKey} darkMode={darkMode} setDarkMode={setDarkMode}/>}
      {modal==="viaje" &&<ModalViaje fV={fV} setFV={setFV} onCrear={crearViaje} onCerrar={()=>setModal(null)}/>}
      {modal==="editarViaje" &&<ModalViaje fV={fV} setFV={setFV} onCrear={guardarEdicionViaje} onCerrar={()=>setModal(null)} editando={true}/>}
      {modal==="gasto" &&<ModalGasto fG={fG} setFG={setFG} onAgregar={agregarGasto} onCerrar={()=>setModal(null)}/>}
      {modal==="nafta" &&<ModalNafta fN={fN} setFN={setFN} onAgregarComoGasto={(costo,km)=>{setGastos(p=>[...p,{id:Date.now(),cat:"nafta",desc:`Nafta — ${km} km`,monto:costo,fecha:new Date().toLocaleDateString("es-AR")}]);setModal(null);}} onCerrar={()=>setModal(null)}/>}
      {modal==="parada"&&<ModalAgregarParada opcionSel={opcionSel} onAgregar={agregarParada} onCerrar={()=>setModal(null)}/>}
      {modal==="editarParada"&&<ModalEditarParada f={fEP} setF={setFEP} onGuardar={guardarEdicionParada} onCerrar={()=>setModal(null)}/>}
      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={{...S.nvb(tab===t.id,t.color),position:"relative"}} onClick={()=>setTab(t.id)} aria-label={t.label}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
            {t.id==="historial"&&historial.length>0&&<div style={{position:"absolute",top:6,right:"50%",transform:"translateX(10px)",background:"#718096",color:"white",borderRadius:"50%",width:15,height:15,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>{historial.length}</div>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));}</script>
</body>
</html>
