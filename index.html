body { background: #f7fafc; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
input:focus { outline: 2px solid #4299e1; }

<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATS = {
  nafta:       { icon:"⛽", label:"Nafta",       color:"#e53e3e" },
  comida:      { icon:"🍔", label:"Comida",      color:"#ed8936" },
  hospedaje:   { icon:"🏨", label:"Hospedaje",   color:"#3182ce" },
  actividades: { icon:"🎡", label:"Actividades", color:"#38a169" },
  otro:        { icon:"📦", label:"Otro",        color:"#718096" },
};
const TABS = [
  { id:"inicio",     icon:"🏠", label:"Inicio",  color:"#2b6cb0" },
  { id:"itinerario", icon:"📅", label:"Plan",    color:"#38a169" },
  { id:"mapa",       icon:"🗺️", label:"Mapa",    color:"#e53e3e" },
  { id:"gastos",     icon:"💰", label:"Gastos",  color:"#d69e2e" },
  { id:"config",     icon:"⚙️", label:"Config",  color:"#4a5568" },
];

const fmtM  = n => "$"+(Math.round(n)||0).toLocaleString("es-AR");
const fmtDt = str => { try{ return new Date(str).toLocaleString("es-AR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }catch{ return "—"; } };

async function geocode(q) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=es`,
      { headers:{"User-Agent":"ViajeFacil/1.0"} });
    const d = await r.json();
    if(d.length) return { lat:parseFloat(d[0].lat), lng:parseFloat(d[0].lon) };
  } catch(e){}
  return null;
}

function buildDays(fR, fD) {
  const days=[]; let cur=new Date(fR); cur.setHours(0,0,0,0);
  const end=new Date(fD); end.setHours(23,59,59,0); let idx=1;
  while(cur<=end){
    days.push({ idx, fecha:cur.toISOString().split("T")[0],
      label:cur.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"}),
      lugares:[], hospedaje:null });
    cur.setDate(cur.getDate()+1); idx++;
  }
  return days;
}

const S = {
  app:  { maxWidth:430, margin:"0 auto", minHeight:"100vh", background:"#f7fafc", position:"relative", paddingBottom:72 },
  hdr:  c => ({ background:c, padding:"16px 20px 14px", color:"white" }),
  card: { background:"white", borderRadius:14, padding:16, marginBottom:12, boxShadow:"0 1px 6px rgba(0,0,0,0.08)" },
  btn:  (c,l) => ({ background:l?`${c}18`:c, color:l?c:"white", border:l?`1.5px solid ${c}`:"none", borderRadius:10, padding:"11px 16px", fontWeight:"bold", fontSize:14, cursor:"pointer", width:"100%", marginTop:8, display:"block" }),
  inp:  { width:"100%", border:"1.5px solid #e2e8f0", borderRadius:10, padding:"10px 13px", fontSize:14, background:"white", marginBottom:4 },
  lbl:  { fontSize:12, color:"#718096", marginBottom:5, display:"block", marginTop:12 },
  ovr:  { position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:1000, display:"flex", alignItems:"flex-end", justifyContent:"center" },
  sht:  { background:"white", borderRadius:"18px 18px 0 0", padding:"20px 20px 36px", width:"100%", maxWidth:430, maxHeight:"90vh", overflowY:"auto" },
  nav:  { position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"white", borderTop:"1px solid #e2e8f0", display:"flex", zIndex:500 },

// ── MAPA LEAFLET ───────────────────────────────────────────
let _map=null, _mlayer=null, _gpsM=null;

function MapaLeaflet({ puntos, posGPS, cargando }) {
  const ref = useRef(null);

  useEffect(() => {
    if(!ref.current || _map) return;
    _map = L.map(ref.current,{zoomControl:true}).setView([-26.8,-65.2],7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {attribution:"© OpenStreetMap",maxZoom:19}).addTo(_map);
    return () => {};
  },[]);

  useEffect(() => {
    setTimeout(()=>{ if(_map) _map.invalidateSize(); },150);
  },[]);

  useEffect(() => {
    if(!_map) return;
    if(_mlayer){ _map.removeLayer(_mlayer); _mlayer=null; }
    if(!puntos||!puntos.length) return;
    _mlayer = L.layerGroup().addTo(_map);
    const bounds=[];
    const colores={origen:"#38a169",destino:"#e53e3e",turistico:"#3182ce",hospedaje:"#d69e2e"};

    puntos.forEach((p,i) => {
      if(!p.lat||!p.lng) return;
      const c=colores[p.tipo]||"#718096";
      const lbl=p.tipo==="origen"?"A":p.tipo==="destino"?"B":p.tipo==="hospedaje"?"🏕":(p.num||i);
      const ico=L.divIcon({
        html:`<div style="background:${c};color:white;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;box-shadow:0 3px 8px rgba(0,0,0,0.35);border:2px solid white;">${lbl}</div>`,
        className:"",iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-18]
      });
      L.marker([p.lat,p.lng],{icon:ico})
        .bindPopup(`<div style="min-width:160px"><strong>${p.nombre}</strong>${p.descripcion?`<br/><small style="color:#555">${p.descripcion}</small>`:""}</div>`)
        .addTo(_mlayer);
      bounds.push([p.lat,p.lng]);
    });

    // Línea de recorrido
    if(bounds.length>=2){
      L.polyline(bounds,{color:"#2b6cb0",weight:4,opacity:.65,dashArray:"8,4"}).addTo(_mlayer);
    }
    if(bounds.length) _map.fitBounds(bounds,{padding:[50,50],maxZoom:13});
  },[puntos]);

  useEffect(() => {
    if(!_map) return;
    if(_gpsM){ _map.removeLayer(_gpsM); _gpsM=null; }
    if(!posGPS) return;
    const ico=L.divIcon({
      html:`<div style="background:#805ad5;border:3px solid white;border-radius:50%;width:20px;height:20px;box-shadow:0 2px 8px rgba(128,90,213,.6);animation:pulse 2s infinite"></div>`,
      className:"",iconSize:[20,20],iconAnchor:[10,10]
    });
    _gpsM=L.marker([posGPS.lat,posGPS.lng],{icon:ico}).bindPopup("📍 Tu posición actual").addTo(_map);
  },[posGPS]);

  return (
    <div style={{position:"relative",height:"100%"}}>
      {cargando && (
        <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,.88)",zIndex:999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:40}}>🗺️</div>
          <div style={{color:"#4a5568",marginTop:12,fontSize:15,fontWeight:"bold"}}>Cargando mapa...</div>
          <div style={{color:"#a0aec0",fontSize:12,marginTop:4}}>Geocodificando lugares</div>
        </div>
      )}
      <div ref={ref} style={{width:"100%",height:"100%"}}/>
    </div>
  );
}

// ── MODALES ────────────────────────────────────────────────
function ModalViaje({fV,setFV,onCrear,onCerrar}){

    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>

        <div style={{fontSize:13,color:"#718096",marginBottom:4}}>Completá los datos</div>
        <label style={S.lbl}>📍 Desde (origen) *</label>
        <input style={S.inp} placeholder="Ej: Tucumán" value={fV.origen} onChange={e=>setFV(p=>({...p,origen:e.target.value}))}/>
        <label style={S.lbl}>🏁 Hasta (destino) *</label>
        <input style={S.inp} placeholder="Ej: Tafí del Valle" value={fV.destino} onChange={e=>setFV(p=>({...p,destino:e.target.value}))}/>
        <label style={S.lbl}>🚗 Auto (opcional)</label>
        <input style={S.inp} placeholder="Ej: VW Polo blanco" value={fV.auto} onChange={e=>setFV(p=>({...p,auto:e.target.value}))}/>
        <label style={S.lbl}>🔢 KM al retiro (opcional)</label>
        <input style={S.inp} type="number" placeholder="Ej: 48320" value={fV.km} onChange={e=>setFV(p=>({...p,km:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha/hora de retiro del auto *</label>
        <input style={S.inp} type="datetime-local" value={fV.fRetiro} onChange={e=>setFV(p=>({...p,fRetiro:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha/hora de devolución *</label>
        <input style={S.inp} type="datetime-local" value={fV.fDevol} onChange={e=>setFV(p=>({...p,fDevol:e.target.value}))}/>
        <label style={S.lbl}>👨‍👩‍👧 Cantidad de personas</label>
        <input style={S.inp} type="number" min="1" value={fV.pers} onChange={e=>setFV(p=>({...p,pers:e.target.value}))}/>
        <button style={S.btn("#2b6cb0")} onClick={onCrear}>✅ Crear Viaje</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>

}

function ModalGasto({fG,setFG,onAgregar,onCerrar}){

    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,marginBottom:12,color:"#2d3748"}}>💰 Agregar Gasto</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {Object.entries(CATS).map(([k,c])=>(
            <button key={k} onClick={()=>setFG(p=>({...p,cat:k}))} style={{background:fG.cat===k?c.color:"white",color:fG.cat===k?"white":"#4a5568",border:`1.5px solid ${fG.cat===k?c.color:"#e2e8f0"}`,borderRadius:10,padding:"10px 8px",cursor:"pointer",fontSize:13,fontWeight:fG.cat===k?"bold":"normal"}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
        <label style={{...S.lbl,marginTop:4}}>Descripción (opcional)</label>
        <input style={S.inp} placeholder="Ej: Almuerzo en Tafí" value={fG.desc} onChange={e=>setFG(p=>({...p,desc:e.target.value}))}/>
        <label style={S.lbl}>Monto ($) *</label>
        <input style={S.inp} type="number" placeholder="Ej: 4500" value={fG.monto} onChange={e=>setFG(p=>({...p,monto:e.target.value}))}/>
        <button style={S.btn("#d69e2e")} onClick={onAgregar}>✅ Agregar</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>
    </div>
  );
}

function ModalNafta({fN,setFN,litros,costoN,onAgregarComoGasto,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,color:"#2d3748"}}>⛽ Calculadora de Nafta</div>
        <div style={{fontSize:13,color:"#718096",marginBottom:8}}>Estimá el costo de combustible</div>
        <label style={{...S.lbl,marginTop:4}}>Kilómetros a recorrer</label>
        <input style={S.inp} type="number" placeholder="Ej: 250" value={fN.km} onChange={e=>setFN(p=>({...p,km:e.target.value}))}/>
        <label style={S.lbl}>Rendimiento (km por litro)</label>
        <input style={S.inp} type="number" placeholder="Ej: 12" value={fN.rend} onChange={e=>setFN(p=>({...p,rend:e.target.value}))}/>
        <label style={S.lbl}>Precio del litro ($)</label>
        <input style={S.inp} type="number" placeholder="Ej: 1200" value={fN.precio} onChange={e=>setFN(p=>({...p,precio:e.target.value}))}/>
        {litros>0 && (
          <div style={{background:"#ebf8ff",borderRadius:12,padding:18,marginTop:16,textAlign:"center"}}>
            <div style={{fontSize:12,color:"#718096"}}>Litros necesarios</div>
            <div style={{fontSize:34,fontWeight:"bold",color:"#2b6cb0"}}>{litros} L</div>
            {costoN>0 && <><div style={{fontSize:12,color:"#718096",marginTop:10}}>Costo estimado</div><div style={{fontSize:28,fontWeight:"bold",color:"#e53e3e"}}>{fmtM(costoN)}</div></>}
          </div>
        )}
        {costoN>0 && <button style={S.btn("#d69e2e")} onClick={onAgregarComoGasto}>+ Agregar como gasto de nafta</button>}
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cerrar</button>
      </div>
    </div>

}

function ModalDia({reco,diaIdx,itinerario,setItinerario,onCerrar}){
  const dia=itinerario[diaIdx];
  const togLugar=l=>setItinerario(prev=>prev.map((d,i)=>{
    if(i!==diaIdx) return d;
    const ex=d.lugares.find(x=>x.nombre===l.nombre);
    return {...d,lugares:ex?d.lugares.filter(x=>x.nombre!==l.nombre):[...d.lugares,l]};
  }));
  const setHostal=h=>setItinerario(prev=>prev.map((d,i)=>{
    if(i!==diaIdx) return d;
    return {...d,hospedaje:d.hospedaje?.nombre===h.nombre?null:h};
  }));
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:17,color:"#2d3748",marginBottom:2}}>📅 Día {dia?.idx}</div>
        <div style={{fontSize:13,color:"#718096",marginBottom:14,textTransform:"capitalize"}}>{dia?.label}</div>
        <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:8,fontSize:14}}>📸 Lugares a visitar</div>
        {(reco?.lugares||[]).map((l,i)=>{
          const sel=dia?.lugares.find(x=>x.nombre===l.nombre);
          return(
            <div key={i} onClick={()=>togLugar(l)} style={{border:`2px solid ${sel?"#3182ce":"#e2e8f0"}`,borderRadius:10,padding:12,marginBottom:8,cursor:"pointer",background:sel?"#ebf8ff":"white"}}>
              <div style={{fontWeight:"bold",color:sel?"#2b6cb0":"#2d3748",fontSize:13}}>{sel?"✅ ":""}{l.nombre}</div>
              <div style={{fontSize:12,color:"#718096",marginTop:3}}>{l.descripcion}</div>
              <div style={{fontSize:11,color:"#a0aec0",marginTop:2}}>🕐 {l.tiempo}</div>
            </div>
          );
        })}
        <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:8,fontSize:14,marginTop:14}}>🏕️ Hospedaje esta noche</div>
        {(reco?.hospedajes||[]).map((h,i)=>{
          const sel=dia?.hospedaje?.nombre===h.nombre;
          return(
            <div key={i} onClick={()=>setHostal(h)} style={{border:`2px solid ${sel?"#d69e2e":"#e2e8f0"}`,borderRadius:10,padding:12,marginBottom:8,cursor:"pointer",background:sel?"#fffbeb":"white"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontWeight:"bold",color:sel?"#b7791f":"#2d3748",fontSize:13}}>
                  {sel?"✅ ":""}{h.tipo==="camping"?"🏕️":h.tipo==="hostel"?"🛏️":"🏠"} {h.nombre}
                </div>
                <span style={S.bdg(h.precio==="bajo"?"#38a169":"#d69e2e")}>{h.precio==="bajo"?"💚 Económico":"💛 Medio"}</span>
              </div>
              <div style={{fontSize:12,color:"#718096",marginTop:4}}>{h.descripcion}</div>
            </div>
          );
        })}
        <button style={S.btn("#38a169")} onClick={onCerrar}>✅ Listo</button>
      </div>
    </div>
  );
}

// ── PANTALLAS ──────────────────────────────────────────────

  const [tmp,setTmp]=useState(apiKey);
  const [ok,setOk]=useState(false);
  const guardar=()=>{ setApiKey(tmp.trim()); setOk(true); setTimeout(()=>setOk(false),2500); };
  return(
    <div>
      <div style={S.hdr("#4a5568")}><div style={{fontSize:22,fontWeight:"bold"}}>⚙️ Configuración</div><div style={{fontSize:13,opacity:.8}}>API Key de Groq (gratis)</div></div>
      <div style={{padding:16}}>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:15,marginBottom:8}}>🤖 Tu API Key de Groq</div>
          <div style={{fontSize:13,color:"#718096",marginBottom:12,lineHeight:1.6}}>Necesitás esta clave para la IA. Es <strong>100% gratis</strong>.<br/>📌 Conseguila en: <strong>console.groq.com</strong></div>
          <label style={{...S.lbl,marginTop:0}}>Tu clave (gsk_...)</label>
          <input style={{...S.inp,fontFamily:"monospace",fontSize:12}} type="password" placeholder="gsk_..." value={tmp} onChange={e=>setTmp(e.target.value)}/>
          <button style={S.btn(ok?"#38a169":"#4a5568")} onClick={guardar}>{ok?"✅ ¡Guardada!":"💾 Guardar"}</button>
          <div style={{marginTop:10,padding:10,background:apiKey?"#f0fff4":"#fffbeb",borderRadius:8,textAlign:"center"}}>
            <span style={{fontSize:13,color:apiKey?"#276749":"#744210"}}>{apiKey?"✅ Clave configurada — IA lista":"⚠️ Sin clave — la IA no funcionará"}</span>
          </div>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:14,marginBottom:8}}>📖 Cómo obtenerla (gratis)</div>
          {[["1️⃣","Entrá a console.groq.com"],["2️⃣","Creá una cuenta (podés usar Google)"],["3️⃣","Andá a 'API Keys' en el menú"],["4️⃣","Click en 'Create API Key'"],["5️⃣","Copiá la clave y pegala arriba"]].map(([n,t])=>(
            <div key={n} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #f4f4f4",alignItems:"center"}}>
              <span style={{fontSize:16,minWidth:28}}>{n}</span>
              <span style={{fontSize:13,color:"#4a5568"}}>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                    <div style={{background:pct>80?"#e53e3e":"#2b6cb0",height:"100%",width:`${pct}%`,borderRadius:8,transition:"width .5s"}}/>
                  </div>
                  <div style={{fontSize:11,color:"#a0aec0",marginTop:4}}>Tiempo transcurrido: {pct}%</div>
                </div>
              </>
            )}

            {estado==="listo" && (
              <div style={{...S.card,textAlign:"center",background:"#f0fff4",border:"2px solid #38a169"}}>
                <div style={{fontSize:36}}>🚦</div>
                <div style={{fontWeight:"bold",color:"#276749",fontSize:16,marginTop:8}}>¡Todo listo para partir!</div>
                <div style={{fontSize:13,color:"#718096",margin:"6px 0 4px"}}>Cuando retirés el auto, tocá este botón. Ahí empieza a correr el tiempo.</div>
                <button style={S.btn("#38a169")} onClick={onIniciar}>🚗 Iniciar Viaje</button>
              </div>
            )}

            {!reco && !loading && estado!=="viajando" && (
              <div style={{...S.card,textAlign:"center",padding:24}}>
                <div style={{fontSize:40}}>🤖</div>
                <div style={{fontWeight:"bold",color:"#2d3748",marginTop:10}}>Buscar rutas y lugares con IA</div>
                <div style={{fontSize:13,color:"#718096",margin:"6px 0 4px"}}>{!apiKey?"⚠️ Primero configurá tu API Key en ⚙️ Config":"La IA sugerirá rutas, lugares y hospedajes"}</div>
                <button style={S.btn(apiKey?"#38a169":"#a0aec0")} onClick={apiKey?onIA:undefined} disabled={!apiKey}>
                  🔍 {apiKey?"Buscar ahora":"Configurá la API Key primero"}
                </button>
              </div>
            )}
            {loading&&<div style={{...S.card,textAlign:"center",padding:28}}><div style={{fontSize:40}}>🔍</div><div style={{color:"#718096",marginTop:8}}>Buscando con IA...</div></div>}
            {reco&&!reco.error&&estado!=="viajando"&&(
              <div style={{...S.card,background:"#f0fff4",border:"1px solid #9ae6b4"}}>
                <div style={{fontWeight:"bold",color:"#276749",marginBottom:4}}>✅ IA completó la búsqueda</div>
                <div style={{fontSize:13,color:"#4a5568"}}>{reco.rutas?.length||0} rutas · {reco.lugares?.length||0} lugares · {reco.hospedajes?.length||0} hospedajes</div>
                <div style={{fontSize:13,color:"#718096",marginTop:4}}>→ Andá a 📅 Plan para armar el itinerario · 🗺️ Mapa para verlo</div>
              </div>
            )}
            {reco?.error&&<div style={{...S.card,background:"#fff5f5",border:"1px solid #feb2b2"}}><div style={{fontWeight:"bold",color:"#c53030"}}>❌ Error</div><div style={{fontSize:13,color:"#4a5568",marginTop:4}}>{reco.error}</div><button style={S.btn("#e53e3e",true)} onClick={onIA}>Reintentar</button></div>}
            <button style={S.btn("#2b6cb0",true)} onClick={onNuevo}>+ Nuevo Viaje</button>
          </>
        )}
      </div>
    </div>
  );
}

      <div style={{padding:16}}>

}

function PantallaGastos({gastos,setGastos,pers,setPers,setModal}){
  const total=gastos.reduce((s,g)=>s+g.monto,0);
  const porPers=pers>0?Math.ceil(total/pers):total;
  return(
    <div>
      <div style={S.hdr("#d69e2e")}><div style={{fontSize:22,fontWeight:"bold"}}>💰 Gastos</div><div style={{fontSize:13,opacity:.8}}>Total: {fmtM(total)}</div></div>
      <div style={{padding:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {Object.entries(CATS).map(([k,c])=>{
            const t=gastos.filter(g=>g.cat===k).reduce((s,g)=>s+g.monto,0);
            return(<div key={k} style={{...S.card,textAlign:"center",padding:12,marginBottom:0,borderLeft:`4px solid ${c.color}`}}><div style={{fontSize:22}}>{c.icon}</div><div style={{fontSize:12,color:"#718096",marginTop:2}}>{c.label}</div><div style={{fontSize:16,fontWeight:"bold",color:c.color}}>{fmtM(t)}</div></div>);
          })}
        </div>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:10}}>👨‍👩‍👧 División por persona</div>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:10}}>
            <span style={{fontSize:13,color:"#718096"}}>Personas:</span>
            <button onClick={()=>setPers(p=>Math.max(1,p-1))} style={{width:32,height:32,borderRadius:16,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontWeight:"bold",fontSize:18}}>-</button>
            <span style={{fontWeight:"bold",fontSize:20,minWidth:24,textAlign:"center"}}>{pers}</span>
            <button onClick={()=>setPers(p=>p+1)} style={{width:32,height:32,borderRadius:16,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontWeight:"bold",fontSize:18}}>+</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid #f4f4f4"}}><span style={{color:"#718096",fontSize:14}}>Por persona:</span><span style={{fontWeight:"bold",color:"#d69e2e",fontSize:22}}>{fmtM(porPers)}</span></div>
        </div>
        <button style={S.btn("#d69e2e")} onClick={()=>setModal("gasto")}>+ Agregar Gasto</button>
        <button style={S.btn("#d69e2e",true)} onClick={()=>setModal("nafta")}>⛽ Calculadora de Nafta</button>
        {gastos.length>0&&(
          <div style={S.card}>
            <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:8}}>📋 Lista de gastos</div>
            {[...gastos].reverse().map(g=>(
              <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f4f4f4"}}>
                <div><span style={{fontSize:14}}>{CATS[g.cat].icon} </span><span style={{fontSize:13,color:"#2d3748"}}>{g.desc||CATS[g.cat].label}</span><div style={{fontSize:11,color:"#a0aec0"}}>{g.fecha}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontWeight:"bold",color:CATS[g.cat].color}}>{fmtM(g.monto)}</span>
                  <button onClick={()=>setGastos(p=>p.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:"#fc8181",cursor:"pointer",fontSize:18}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}
        {gastos.length===0&&<div style={{...S.card,textAlign:"center",padding:28,color:"#a0aec0"}}><div style={{fontSize:40}}>💸</div><div style={{marginTop:8}}>Sin gastos registrados aún</div></div>}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────
function App(){
  const [tab,        setTab]       = useState("inicio");
  const [apiKey,     setApiKey]    = useState("");
  const [viaje,      setViaje]     = useState(null);
  const [estado,     setEstado]    = useState("nuevo");
  const [reco,       setReco]      = useState(null);
  const [loadingIA,  setLoadingIA] = useState(false);
  const [itinerario, setItin]      = useState([]);
  const [gastos,     setGastos]    = useState([]);
  const [pers,       setPers]      = useState(2);
  const [modal,      setModal]     = useState(null);
  const [posGPS,     setPosGPS]    = useState(null);
  const [puntos,     setPuntos]    = useState([]);
  const [loadingM,   setLoadingM]  = useState(false);
  const [tRest,      setTRest]     = useState("");
  const [pct,        setPct]       = useState(0);
  const [inicioR,    setInicioR]   = useState(null);
  const [fV,setFV]  = useState({origen:"",destino:"",auto:"",km:"",fRetiro:"",fDevol:"",pers:"2"});
  const [fG,setFG]  = useState({cat:"nafta",desc:"",monto:""});
  const [fN,setFN]  = useState({km:"",rend:"12",precio:""});

  // Invalidar mapa al cambiar a tab mapa
  useEffect(()=>{ if(tab==="mapa"&&_map) setTimeout(()=>_map.invalidateSize(),150); },[tab]);

  // Countdown — solo corre cuando viajando
  useEffect(()=>{
    if(estado!=="viajando"||!viaje) return;
    const calc=()=>{
      const now=new Date(), dev=new Date(viaje.fDevol), ini=inicioR||now;
      const diff=dev-now, total=dev-ini, usado=now-ini;
      setPct(Math.min(100,Math.max(0,Math.round((usado/total)*100))));
      if(diff<=0){ setTRest("¡Tiempo vencido!"); return; }
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
      setTRest(`${d}d ${h}h ${m}m`);
    };
    calc();
    const iv=setInterval(calc,30000);
    return()=>clearInterval(iv);
  },[estado,viaje,inicioR]);

  const alerta=estado==="viajando"&&viaje&&(()=>{ const d=new Date(viaje.fDevol)-new Date(); return d>0&&d<3*3600000; })();

  const crearViaje=()=>{
    if(!fV.origen||!fV.destino||!fV.fRetiro||!fV.fDevol) return;
    const v={id:Date.now(),...fV,pers:parseInt(fV.pers)||2};
    setViaje(v); setItin(buildDays(fV.fRetiro,fV.fDevol));
    setPers(v.pers); setReco(null); setPuntos([]); setEstado("planificando"); setInicioR(null);
    setModal(null); setFV({origen:"",destino:"",auto:"",km:"",fRetiro:"",fDevol:"",pers:"2"});
    setTab("inicio");
  };

  const buscarIA=async()=>{
    if(!viaje||!apiKey) return;
    setLoadingIA(true); setReco(null);
    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile", max_tokens:1200,
          messages:[
            {role:"system",content:"Sos un asistente de viajes argentino. Respondé siempre en español con JSON válido."},
            {role:"user",content:`Viajo desde ${viaje.origen} hasta ${viaje.destino} en auto con familia argentina. Respondé SOLO con JSON sin texto extra ni backticks: {"rutas":[{"nombre":"string","km":number,"tiempo":"string","descripcion":"string"},{"nombre":"string","km":number,"tiempo":"string","descripcion":"string"}],"lugares":[{"nombre":"string","descripcion":"string","tiempo":"string"},{"nombre":"string","descripcion":"string","tiempo":"string"},{"nombre":"string","descripcion":"string","tiempo":"string"}],"hospedajes":[{"nombre":"string","tipo":"camping","precio":"bajo","descripcion":"string"},{"nombre":"string","tipo":"hostel","precio":"bajo","descripcion":"string"},{"nombre":"string","tipo":"cabaña","precio":"medio","descripcion":"string"}]}`}
          ]
        })
      });
      const data=await res.json();
      if(data.error){ setReco({error:data.error.message||"Error de API"}); setLoadingIA(false); return; }
      const txt=data.choices[0].message.content.replace(/```json|```/g,"").trim();
      setReco(JSON.parse(txt));
      setEstado("listo");
    }catch(e){ setReco({error:"No se pudo conectar. Verificá tu API Key de Groq en ⚙️ Config."}); }
    setLoadingIA(false);
  };

  const cargarMapa=async()=>{
    if(!viaje) return;
    setLoadingM(true);
    const pts=[];
    const orig=await geocode(viaje.origen+", Argentina");
    if(orig) pts.push({...orig,nombre:viaje.origen,tipo:"origen",descripcion:"Punto de partida"});

    const tieneItin=itinerario.some(d=>d.lugares.length>0||d.hospedaje);
    if(tieneItin){
      let n=1;
      for(const dia of itinerario){
        for(const l of dia.lugares){ const c=await geocode(l.nombre+", Argentina"); if(c) pts.push({...c,nombre:l.nombre,descripcion:l.descripcion,tipo:"turistico",num:n++}); }
        if(dia.hospedaje){ const c=await geocode(dia.hospedaje.nombre+", Argentina"); if(c) pts.push({...c,nombre:dia.hospedaje.nombre,descripcion:dia.hospedaje.descripcion,tipo:"hospedaje"}); }
      }
    } else if(reco&&!reco.error){
      let n=1;
      for(const l of (reco.lugares||[])){ const c=await geocode(l.nombre+", Argentina"); if(c) pts.push({...c,nombre:l.nombre,descripcion:l.descripcion,tipo:"turistico",num:n++}); }
      for(const h of (reco.hospedajes||[])){ const c=await geocode(h.nombre+", Argentina"); if(c) pts.push({...c,nombre:h.nombre,descripcion:h.descripcion,tipo:"hospedaje"}); }
    }

    const dest=await geocode(viaje.destino+", Argentina");
    if(dest) pts.push({...dest,nombre:viaje.destino,tipo:"destino",descripcion:"Destino final"});
    setPuntos(pts); setLoadingM(false);
  };

  const iniciarViaje=()=>{
    const ahora=new Date();
    setInicioR(ahora); setEstado("viajando");
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(
        pos=>setPosGPS({lat:pos.coords.latitude,lng:pos.coords.longitude}),
        e=>console.log("GPS:",e),
        {enableHighAccuracy:true,maximumAge:30000}
      );
    }
    cargarMapa();
    setTab("mapa");
  };

  const agregarGasto=()=>{
    if(!fG.monto) return;
    setGastos(p=>[...p,{id:Date.now(),cat:fG.cat,desc:fG.desc,monto:parseFloat(fG.monto),fecha:new Date().toLocaleDateString("es-AR")}]);
    setModal(null); setFG({cat:"nafta",desc:"",monto:""});
  };

  const litros=fN.km&&fN.rend?(parseFloat(fN.km)/parseFloat(fN.rend)).toFixed(1):0;
  const costoN=litros&&fN.precio?Math.round(litros*parseFloat(fN.precio)):0;

  return(
    <div style={S.app}>
      {/* Mapa siempre montado para que Leaflet no pierda el div */}
      <div style={{display:tab==="mapa"?"block":"none",height:"calc(100vh - 72px)"}}>
        <PantallaMapa viaje={viaje} reco={reco} puntos={puntos} loading={loadingM} posGPS={posGPS} estado={estado} onRecargar={cargarMapa}/>
      </div>

      {tab==="inicio"     && <PantallaInicio viaje={viaje} estado={estado} reco={reco} loading={loadingIA} apiKey={apiKey} tRest={tRest} pct={pct} alerta={alerta} onNuevo={()=>setModal("viaje")} onIA={buscarIA} onIniciar={iniciarViaje} setModal={setModal}/>}
      {tab==="itinerario" && <PantallaItinerario viaje={viaje} reco={reco} itinerario={itinerario} setItinerario={setItin}/>}
      {tab==="gastos"     && <PantallaGastos gastos={gastos} setGastos={setGastos} pers={pers} setPers={setPers} setModal={setModal}/>}
      {tab==="config"     && <PantallaConfig apiKey={apiKey} setApiKey={setApiKey}/>}

      {modal==="viaje" && <ModalViaje fV={fV} setFV={setFV} onCrear={crearViaje} onCerrar={()=>setModal(null)}/>}
      {modal==="gasto" && <ModalGasto fG={fG} setFG={setFG} onAgregar={agregarGasto} onCerrar={()=>setModal(null)}/>}
      {modal==="nafta" && <ModalNafta fN={fN} setFN={setFN} litros={litros} costoN={costoN} onAgregarComoGasto={()=>{setFG({cat:"nafta",desc:`Nafta — ${fN.km} km`,monto:String(costoN)});setModal("gasto");}} onCerrar={()=>setModal(null)}/>}

      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={S.nvb(tab===t.id,t.color)} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
