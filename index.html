<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="shortcut icon" href="icon-192.png" type="image/png"/>
<link rel="icon" href="icon-192.png" type="image/png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}
input:focus{outline:2px solid #4299e1}
textarea:focus{outline:2px solid #4299e1}
.leaflet-container{font-family:system-ui!important}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── LOCALSTORAGE ───────────────────────────────────────────
const LS = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{} },
  del:(k)=>{ try{localStorage.removeItem(k);}catch{} },
};

// ── CONSTANTES ─────────────────────────────────────────────
const TIPOS = {
  origen:   {icon:"🚀",color:"#38a169",label:"Salida"},
  destino:  {icon:"🏁",color:"#e53e3e",label:"Destino"},
  ruta:     {icon:"🛑",color:"#718096",label:"Parada ruta"},
  descanso: {icon:"☕",color:"#3182ce",label:"Descanso"},
  comida:   {icon:"🍽️",color:"#ed8936",label:"Comer"},
  turistico:{icon:"⭐",color:"#0bc5ea",label:"Turístico"},
  mirador:  {icon:"🏔️",color:"#805ad5",label:"Mirador"},
  dormir:   {icon:"🌙",color:"#2d3748",label:"Dormir"},
};
const CATS = {
  nafta:{icon:"⛽",label:"Nafta",color:"#e53e3e"},
  comida:{icon:"🍔",label:"Comida",color:"#ed8936"},
  hospedaje:{icon:"🏨",label:"Hospedaje",color:"#3182ce"},
  actividades:{icon:"🎡",label:"Actividades",color:"#38a169"},
  otro:{icon:"📦",label:"Otro",color:"#718096"},
};
const TABS=[
  {id:"inicio",   icon:"🏠",label:"Inicio",  color:"#2b6cb0"},
  {id:"opciones", icon:"🗂️",label:"Opciones",color:"#38a169"},
  {id:"mapa",     icon:"🗺️",label:"Mapa",    color:"#e53e3e"},
  {id:"gastos",   icon:"💰",label:"Gastos",  color:"#d69e2e"},
  {id:"historial",icon:"📋",label:"Historial",color:"#718096"},
];

const fmtM  = n=>"$"+(Math.round(n)||0).toLocaleString("es-AR");
const fmtDt = s=>{ try{return new Date(s).toLocaleString("es-AR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}catch{return "—";} };
const fmtDs = s=>{ try{return new Date(s).toLocaleDateString("es-AR",{day:"numeric",month:"long",year:"numeric"});}catch{return "—";} };
const fmtHora= s=>{ try{return new Date(s).toLocaleString("es-AR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});}catch{return s||"—";} };
function calcDias(f1,f2){return Math.max(1,Math.round((new Date(f2)-new Date(f1))/(1000*60*60*24))+1);}

async function getOSRM(pts){
  if(pts.length<2) return null;
  try{
    const coords=pts.map(p=>`${p.lng},${p.lat}`).join(";");
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const d=await r.json();
    if(d.code==="Ok") return d.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);
  }catch{}
  return null;
}

// ── ESTILOS ────────────────────────────────────────────────
const S={
  app:  {maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f0f4f8",position:"relative",paddingBottom:72},
  hdr:  c=>({background:c,padding:"16px 20px 14px",color:"white"}),
  card: {background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"},
  btn:  (c,l)=>({background:l?`${c}18`:c,color:l?c:"white",border:l?`1.5px solid ${c}`:"none",borderRadius:10,padding:"11px 16px",fontWeight:"bold",fontSize:14,cursor:"pointer",width:"100%",marginTop:8,display:"block"}),
  inp:  {width:"100%",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"10px 13px",fontSize:14,background:"white",marginBottom:4},
  lbl:  {fontSize:12,color:"#718096",marginBottom:5,display:"block",marginTop:12},
  ovr:  {position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"},
  sht:  {background:"white",borderRadius:"18px 18px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto"},
  nav:  {position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:500},
  nvb:  (a,c)=>({flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:a?c:"#a0aec0"}),
  bdg:  c=>({background:`${c}18`,color:c,borderRadius:20,padding:"3px 9px",fontSize:12,fontWeight:"bold",display:"inline-block"}),
  row:  {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f4f4f4"},
};

// ── MAPA LEAFLET ───────────────────────────────────────────
let _map=null,_ml=null,_rl=null,_gm=null;
function MapaLeaflet({paradas,posGPS}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||_map) return;
    _map=L.map(ref.current,{zoomControl:true}).setView([-27,-65],6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(_map);
  },[]);
  useEffect(()=>{ setTimeout(()=>{if(_map)_map.invalidateSize();},200); },[]);
  useEffect(()=>{
    if(!_map) return;
    if(_ml){_map.removeLayer(_ml);_ml=null;}
    if(_rl){_map.removeLayer(_rl);_rl=null;}
    if(!paradas?.length) return;
    _ml=L.layerGroup().addTo(_map);
    const bounds=[];
    paradas.forEach(p=>{
      if(!p.lat||!p.lng) return;
      const t=TIPOS[p.tipo]||TIPOS.turistico;
      const ico=L.divIcon({
        html:`<div style="background:${t.color};color:white;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.4);border:2px solid white;">${t.icon}</div>`,
        className:"",iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-22]
      });
      let popHtml=`<div style="min-width:220px;font-family:system-ui">
        <div style="background:${t.color};color:white;padding:8px 12px;margin:-13px -19px 10px;border-radius:4px 4px 0 0;font-weight:bold;font-size:14px">${t.icon} ${p.nombre}</div>
        <div style="font-size:12px;color:#555;margin-bottom:6px">${t.label}${p.horaLlegada?" · 🕐 Llega: "+p.horaLlegada:""}${p.horaSalida?" · Sale: "+p.horaSalida:""}</div>
        ${p.descripcion?`<div style="font-size:13px;color:#333;margin-bottom:6px">${p.descripcion}</div>`:""}
        ${p.kmDesdeAnterior?`<div style="font-size:11px;color:#888">📏 ${p.kmDesdeAnterior} · ⏱ ${p.tiempoManejo||""}</div>`:""}`;
      if(p.alojamientos?.length){
        popHtml+=`<div style="margin-top:8px;font-weight:bold;color:#2d3748;font-size:12px">🏨 Hospedaje:</div>`;
        p.alojamientos.forEach(a=>{ popHtml+=`<div style="font-size:12px;padding:3px 0;border-bottom:1px solid #eee"><strong>${a.nombre}</strong><br/><span style="color:#38a169">${a.precio}</span> · ${a.descripcion}</div>`; });
      }
      if(p.restaurantes?.length){
        popHtml+=`<div style="margin-top:8px;font-weight:bold;color:#2d3748;font-size:12px">🍽️ Dónde comer:</div>`;
        p.restaurantes.forEach(r=>{ popHtml+=`<div style="font-size:12px;padding:3px 0;border-bottom:1px solid #eee"><strong>${r.nombre}</strong><br/><span style="color:#ed8936">${r.precio}</span> · ${r.descripcion}</div>`; });
      }
      popHtml+=`</div>`;
      L.marker([p.lat,p.lng],{icon:ico}).bindPopup(popHtml,{maxWidth:260}).addTo(_ml);
      bounds.push([p.lat,p.lng]);
    });
    const pts=paradas.filter(p=>p.lat&&p.lng);
    if(pts.length>=2){
      getOSRM(pts).then(ruta=>{
        if(!_map) return;
        if(_rl){_map.removeLayer(_rl);_rl=null;}
        _rl=L.polyline(ruta||pts.map(p=>[p.lat,p.lng]),{color:"#2b6cb0",weight:5,opacity:.8,dashArray:ruta?null:"10,6"}).addTo(_map);
      });
    }
    if(bounds.length) _map.fitBounds(bounds,{padding:[50,50],maxZoom:11});
  },[paradas]);
  useEffect(()=>{
    if(!_map) return;
    if(_gm){_map.removeLayer(_gm);_gm=null;}
    if(!posGPS) return;
    const ico=L.divIcon({html:`<div style="background:#805ad5;border:3px solid white;border-radius:50%;width:22px;height:22px;box-shadow:0 2px 8px rgba(128,90,213,.7);animation:pulse 2s infinite"></div>`,className:"",iconSize:[22,22],iconAnchor:[11,11]});
    _gm=L.marker([posGPS.lat,posGPS.lng],{icon:ico}).bindPopup("📍 Tu posición actual").addTo(_map);
  },[posGPS]);
  return(<div style={{position:"relative",height:"100%"}}><div ref={ref} style={{width:"100%",height:"100%"}}/></div>);
}

// ── COMPONENTE PARADA ──────────────────────────────────────
function Parada({p,isLast}){
  const [open,setOpen]=useState(false);
  const t=TIPOS[p.tipo]||TIPOS.turistico;
  const tieneExtra=(p.alojamientos?.length||p.restaurantes?.length);
  return(
    <div style={{display:"flex",gap:0,marginBottom:0}} className="fade-in">
      {/* Línea de tiempo */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}>
        <div style={{background:t.color,color:"white",borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,zIndex:1,border:"2px solid white",boxShadow:"0 2px 6px rgba(0,0,0,0.2)"}}>{t.icon}</div>
        {!isLast&&<div style={{width:2,flex:1,background:"#e2e8f0",marginTop:4,marginBottom:4,minHeight:20}}/>}
      </div>
      {/* Contenido */}
      <div style={{flex:1,paddingLeft:12,paddingBottom:16,paddingTop:2}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:4}}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:14}}>{p.nombre}</div>
          {p.horaLlegada&&<div style={{background:`${t.color}18`,color:t.color,borderRadius:8,padding:"2px 8px",fontSize:12,fontWeight:"bold"}}>🕐 {p.horaLlegada}</div>}
        </div>
        <div style={{fontSize:12,color:"#718096",marginTop:2}}>{t.label}{p.horaSalida?` · Sale: ${p.horaSalida}`:""}{p.duracion?` · ${p.duracion}`:""}</div>
        {(p.kmDesdeAnterior||p.tiempoManejo)&&<div style={{fontSize:11,color:"#a0aec0",marginTop:2}}>📏 {p.kmDesdeAnterior||""}{p.tiempoManejo?` · ⏱ ${p.tiempoManejo}`:""}</div>}
        {p.descripcion&&<div style={{fontSize:13,color:"#4a5568",marginTop:4,lineHeight:1.4}}>{p.descripcion}</div>}

        {/* Hospedaje */}
        {p.alojamientos?.length>0&&(
          <div style={{marginTop:8}}>
            <button onClick={()=>setOpen(o=>!o)} style={{background:"#2d374818",color:"#2d3748",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold",width:"100%",textAlign:"left"}}>
              🏨 {open?"Ocultar":"Ver"} hospedajes ({p.alojamientos.length} opciones) {open?"▲":"▼"}
            </button>
            {open&&p.alojamientos.map((a,i)=>(
              <div key={i} style={{marginTop:6,padding:10,background:i===0?"#f0fff4":i===1?"#fffbeb":"#f7fafc",borderRadius:10,border:`1px solid ${i===0?"#9ae6b4":i===1?"#f6e05e":"#e2e8f0"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:"bold",fontSize:13,color:"#2d3748"}}>{a.nombre}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:i===0?"#276749":i===1?"#744210":"#4a5568"}}>{i===0?"💚":i===1?"💛":"💜"} {a.precio}</span>
                </div>
                <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{a.descripcion}</div>
              </div>
            ))}
          </div>
        )}

        {/* Restaurantes */}
        {p.restaurantes?.length>0&&(
          <div style={{marginTop:8}}>
            <button onClick={()=>setOpen(o=>!o)} style={{background:"#ed893618",color:"#c05621",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:"bold",width:"100%",textAlign:"left"}}>
              🍽️ {open?"Ocultar":"Ver"} dónde comer ({p.restaurantes.length} opciones) {open?"▲":"▼"}
            </button>
            {open&&p.restaurantes.map((r,i)=>(
              <div key={i} style={{marginTop:6,padding:10,background:i===0?"#fff7ed":i===1?"#fffbeb":"#f7fafc",borderRadius:10,border:`1px solid ${i===0?"#fed7aa":i===1?"#f6e05e":"#e2e8f0"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:"bold",fontSize:13,color:"#2d3748"}}>{r.nombre}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:"#c05621"}}>{i===0?"💚":i===1?"💛":"💜"} {r.precio}</span>
                </div>
                <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{r.descripcion}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── MODALES ────────────────────────────────────────────────
function ModalViaje({fV,setFV,onCrear,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,color:"#2d3748"}}>🚗 Planificar Viaje</div>
        <div style={{fontSize:13,color:"#718096",marginBottom:8,lineHeight:1.5}}>La IA generará 3 itinerarios completos con horarios reales, paradas, hospedaje y lugares para comer</div>
        <label style={S.lbl}>📍 Ciudad de origen *</label>
        <input style={S.inp} placeholder="Ej: San Miguel de Tucumán" value={fV.origen} onChange={e=>setFV(p=>({...p,origen:e.target.value}))}/>
        <label style={S.lbl}>🏁 Ciudad de destino *</label>
        <input style={S.inp} placeholder="Ej: San Salvador de Jujuy" value={fV.destino} onChange={e=>setFV(p=>({...p,destino:e.target.value}))}/>
        <label style={S.lbl}>🛣️ Ruta preferida (opcional)</label>
        <input style={S.inp} placeholder="Ej: Por Ruta 9, pasando por Salta" value={fV.ruta} onChange={e=>setFV(p=>({...p,ruta:e.target.value}))}/>
        <label style={S.lbl}>🚗 Auto (opcional)</label>
        <input style={S.inp} placeholder="Ej: VW Polo" value={fV.auto} onChange={e=>setFV(p=>({...p,auto:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha y hora de SALIDA (cuando retirás el auto) *</label>
        <input style={S.inp} type="datetime-local" value={fV.fRetiro} onChange={e=>setFV(p=>({...p,fRetiro:e.target.value}))}/>
        <label style={S.lbl}>📅 Fecha y hora de DEVOLUCIÓN del auto *</label>
        <input style={S.inp} type="datetime-local" value={fV.fDevol} onChange={e=>setFV(p=>({...p,fDevol:e.target.value}))}/>
        <label style={S.lbl}>👨‍👩‍👧 Cantidad de personas</label>
        <input style={S.inp} type="number" min="1" value={fV.pers} onChange={e=>setFV(p=>({...p,pers:e.target.value}))}/>
        <label style={S.lbl}>📝 Preferencias o notas (opcional)</label>
        <textarea style={{...S.inp,height:70,resize:"none"}} placeholder="Ej: Viajamos con niños, preferimos hospedaje económico, nos gusta la naturaleza..." value={fV.notas} onChange={e=>setFV(p=>({...p,notas:e.target.value}))}/>
        <button style={S.btn("#2b6cb0")} onClick={onCrear}>🤖 Generar 3 opciones con IA</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>
    </div>
  );
}

function ModalGasto({fG,setFG,onAgregar,onCerrar}){
  return(
    <div style={S.ovr} onClick={onCerrar}>
      <div style={S.sht} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:"bold",fontSize:19,marginBottom:12,color:"#2d3748"}}>💰 Agregar Gasto</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {Object.entries(CATS).map(([k,c])=>(<button key={k} onClick={()=>setFG(p=>({...p,cat:k}))} style={{background:fG.cat===k?c.color:"white",color:fG.cat===k?"white":"#4a5568",border:`1.5px solid ${fG.cat===k?c.color:"#e2e8f0"}`,borderRadius:10,padding:"10px 8px",cursor:"pointer",fontSize:13,fontWeight:fG.cat===k?"bold":"normal"}}>{c.icon} {c.label}</button>))}
        </div>
        <label style={{...S.lbl,marginTop:4}}>Descripción (opcional)</label>
        <input style={S.inp} placeholder="Ej: Almuerzo en Salta" value={fG.desc} onChange={e=>setFG(p=>({...p,desc:e.target.value}))}/>
        <label style={S.lbl}>Monto ($) *</label>
        <input style={S.inp} type="number" placeholder="Ej: 4500" value={fG.monto} onChange={e=>setFG(p=>({...p,monto:e.target.value}))}/>
        <button style={S.btn("#d69e2e")} onClick={onAgregar}>✅ Agregar</button>
        <button style={S.btn("#718096",true)} onClick={onCerrar}>Cancelar</button>
      </div>
    </div>
  );
}

// ── PANTALLAS ──────────────────────────────────────────────
function PantallaConfig({apiKey,setApiKey}){
  const [tmp,setTmp]=useState(apiKey);
  const [ok,setOk]=useState(false);
  const guardar=()=>{const k=tmp.trim();setApiKey(k);LS.set("apiKey",k);setOk(true);setTimeout(()=>setOk(false),2500);};
  return(
    <div>
      <div style={S.hdr("#4a5568")}><div style={{fontSize:22,fontWeight:"bold"}}>⚙️ Configuración</div><div style={{fontSize:13,opacity:.8}}>Se guarda automáticamente en tu celular</div></div>
      <div style={{padding:16}}>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:15,marginBottom:8}}>🤖 API Key de Groq (gratis)</div>
          <div style={{fontSize:13,color:"#718096",marginBottom:12,lineHeight:1.6}}>
            Esta clave se guarda en tu celular y <strong>no necesitás volver a ingresarla</strong>.<br/>
            Es 100% gratis. Conseguila en: <strong>console.groq.com</strong>
          </div>
          {apiKey&&<div style={{padding:10,background:"#f0fff4",border:"1px solid #9ae6b4",borderRadius:10,marginBottom:12,fontSize:13,color:"#276749"}}>✅ Clave guardada — la IA está lista para planificar</div>}
          <label style={{...S.lbl,marginTop:0}}>Tu clave (gsk_...)</label>
          <input style={{...S.inp,fontFamily:"monospace",fontSize:12}} type="password" placeholder="gsk_..." value={tmp} onChange={e=>setTmp(e.target.value)}/>
          <button style={S.btn(ok?"#38a169":"#4a5568")} onClick={guardar}>{ok?"✅ ¡Guardada!":"💾 Guardar clave"}</button>
          {!apiKey&&<div style={{marginTop:8,padding:10,background:"#fffbeb",borderRadius:8,textAlign:"center"}}><span style={{fontSize:13,color:"#744210"}}>⚠️ Sin clave — la IA no puede planificar viajes</span></div>}
        </div>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",fontSize:14,marginBottom:8}}>📖 Cómo obtener la clave (gratis)</div>

function PantallaOpciones({opciones,opcionSel,setOpcionSel,loadingIA,iaError,viaje,setTab}){
  const [expandido,setExpandido]=useState(null);
  if(!viaje) return(<div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div></div><div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:36}}><div style={{fontSize:48}}>🗂️</div><div style={{color:"#718096",marginTop:8}}>Creá un viaje primero en 🏠 Inicio</div></div></div></div>);
  if(loadingIA) return(<div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div></div><div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:32}}><div style={{fontSize:44,animation:"spin 1s linear infinite"}}>🤖</div><div style={{fontWeight:"bold",color:"#2d3748",marginTop:12}}>Generando 3 itinerarios completos...</div><div style={{fontSize:13,color:"#718096",marginTop:6}}>Calculando paradas, tiempos y recomendaciones</div></div></div></div>);
  if(iaError) return(<div><div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones</div></div><div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:32,background:"#fff5f5"}}><div style={{fontSize:44}}>❌</div><div style={{fontWeight:"bold",color:"#c53030",marginTop:10}}>Error al generar opciones</div><div style={{fontSize:13,color:"#718096",marginTop:6}}>Andá a 🏠 Inicio para reintentar</div></div></div></div>);

  const cols=["#2b6cb0","#38a169","#805ad5"];
  return(
    <div>
      <div style={S.hdr("#38a169")}><div style={{fontSize:22,fontWeight:"bold"}}>🗂️ Opciones de Viaje</div><div style={{fontSize:13,opacity:.8}}>{viaje.origen} → {viaje.destino}</div></div>
      <div style={{padding:16}}>
        <div style={{...S.card,background:"#ebf8ff",padding:12,marginBottom:16}}>
          <div style={{fontSize:13,color:"#2b6cb0"}}>📌 3 opciones generadas según tu ruta y horarios. Tocá una para expandirla y ver el itinerario completo.</div>
        </div>
        {opciones.map((op,oi)=>{
          const sel=opcionSel?.nombre===op.nombre;
          const c=cols[oi]||"#2b6cb0";
          const abierto=expandido===oi;
          const totalParadas=op.dias?.reduce((s,d)=>s+(d.paradas?.length||0),0)||0;
          return(
            <div key={oi} style={{...S.card,border:`2px solid ${sel?c:"#e2e8f0"}`,background:sel?`${c}06`:"white",marginBottom:16}}>
              {/* Cabecera */}
              <div onClick={()=>setExpandido(abierto?null:oi)} style={{cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:"bold",fontSize:16,color:c}}>Opción {oi+1}: {op.nombre}</div>
                    <div style={{fontSize:13,color:"#4a5568",marginTop:2}}>{op.descripcion}</div>
                  </div>
                  <span style={{fontSize:18,color:"#a0aec0",marginLeft:8}}>{abierto?"▲":"▼"}</span>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {op.totalKm&&<span style={S.bdg(c)}>📏 {op.totalKm} km</span>}
                  {op.dias?.length&&<span style={S.bdg("#718096")}>{op.dias.length} día(s)</span>}
                  {totalParadas&&<span style={S.bdg("#718096")}>{totalParadas} paradas</span>}
                  {op.tiempoTotalManejo&&<span style={S.bdg("#718096")}>⏱ {op.tiempoTotalManejo}</span>}
                </div>
              </div>

              {/* Itinerario expandible */}
              {abierto&&(
                <div style={{marginTop:16,borderTop:"1px solid #f4f4f4",paddingTop:16}} className="fade-in">
                  {op.dias?.map((dia,di)=>(
                    <div key={di} style={{marginBottom:16}}>
                      <div style={{fontWeight:"bold",color:"white",background:c,borderRadius:10,padding:"8px 14px",marginBottom:12,fontSize:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span>📅 Día {dia.dia}: {dia.titulo}</span>
                        {dia.kmDelDia&&<span style={{fontSize:12,opacity:.85}}>📏 {dia.kmDelDia} km</span>}

                  ))}
                </div>
              )}

              <button style={S.btn(c,!sel)} onClick={()=>{setOpcionSel(op);LS.set("opcionSel",op);setTab("mapa");}}>
                {sel?"✅ Seleccionada — Ver en Mapa 🗺️":`Elegir Opción ${oi+1} y ver en mapa`}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PantallaGastos({gastos,setGastos,pers,setPers,setModal}){
  const total=gastos.reduce((s,g)=>s+g.monto,0);
  const porPers=pers>0?Math.ceil(total/pers):total;
  return(
    <div>
      <div style={S.hdr("#d69e2e")}><div style={{fontSize:22,fontWeight:"bold"}}>💰 Gastos</div><div style={{fontSize:13,opacity:.8}}>Total: {fmtM(total)}</div></div>
      <div style={{padding:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {Object.entries(CATS).map(([k,c])=>{const t=gastos.filter(g=>g.cat===k).reduce((s,g)=>s+g.monto,0);return(<div key={k} style={{...S.card,textAlign:"center",padding:12,marginBottom:0,borderLeft:`4px solid ${c.color}`}}><div style={{fontSize:22}}>{c.icon}</div><div style={{fontSize:12,color:"#718096",marginTop:2}}>{c.label}</div><div style={{fontSize:16,fontWeight:"bold",color:c.color}}>{fmtM(t)}</div></div>);})}
        </div>
        <div style={S.card}>
          <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:10}}>👥 División por persona</div>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:10}}>
            <span style={{fontSize:13,color:"#718096"}}>Personas:</span>
            <button onClick={()=>setPers(p=>Math.max(1,p-1))} style={{width:32,height:32,borderRadius:16,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontWeight:"bold",fontSize:18}}>-</button>
            <span style={{fontWeight:"bold",fontSize:20,minWidth:24,textAlign:"center"}}>{pers}</span>
            <button onClick={()=>setPers(p=>p+1)} style={{width:32,height:32,borderRadius:16,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontWeight:"bold",fontSize:18}}>+</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid #f4f4f4"}}><span style={{color:"#718096",fontSize:14}}>Por persona:</span><span style={{fontWeight:"bold",color:"#d69e2e",fontSize:22}}>{fmtM(porPers)}</span></div>
        </div>
        <button style={S.btn("#d69e2e")} onClick={()=>setModal("gasto")}>+ Agregar Gasto</button>
        {gastos.length>0&&(<div style={S.card}><div style={{fontWeight:"bold",color:"#2d3748",marginBottom:8}}>📋 Gastos registrados</div>{[...gastos].reverse().map(g=>(<div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f4f4f4"}}><div><span style={{fontSize:14}}>{CATS[g.cat].icon} </span><span style={{fontSize:13,color:"#2d3748"}}>{g.desc||CATS[g.cat].label}</span><div style={{fontSize:11,color:"#a0aec0"}}>{g.fecha}</div></div><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontWeight:"bold",color:CATS[g.cat].color}}>{fmtM(g.monto)}</span><button onClick={()=>setGastos(p=>p.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:"#fc8181",cursor:"pointer",fontSize:18}}>✕</button></div></div>))}</div>)}
        {gastos.length===0&&<div style={{...S.card,textAlign:"center",padding:28,color:"#a0aec0"}}><div style={{fontSize:40}}>💸</div><div style={{marginTop:8}}>Sin gastos registrados aún</div></div>}
      </div>
    </div>
  );
}

    <div><div style={S.hdr("#718096")}><div style={{fontSize:22,fontWeight:"bold"}}>📋 Historial</div></div>
    <div style={{padding:16}}><div style={{...S.card,textAlign:"center",padding:44}}><div style={{fontSize:52}}>🗺️</div><div style={{fontSize:17,fontWeight:"bold",color:"#2d3748",marginTop:14}}>Sin viajes aún</div><div style={{color:"#718096",fontSize:14,marginTop:6}}>Tus viajes completados aparecerán acá</div></div></div></div>

    <div>
      <div style={S.hdr("#718096")}><div style={{fontSize:22,fontWeight:"bold"}}>📋 Historial</div><div style={{fontSize:13,opacity:.8}}>{historial.length} viaje(s) guardado(s)</div></div>
      <div style={{padding:16}}>
        {[...historial].reverse().map((h,i)=>{

            <div key={h.id||i} style={S.card}>

              {h.opcionSel&&<div style={{fontSize:12,color:"#38a169",marginTop:4}}>🗂️ {h.opcionSel.nombre} · {h.opcionSel.totalKm||"?"} km</div>}
              {totalG>0&&<div style={{fontSize:13,color:"#e53e3e",marginTop:4,fontWeight:"bold"}}>💰 Total gastado: {fmtM(totalG)}{h.viaje?.pers>1?` · ${fmtM(Math.ceil(totalG/h.viaje.pers))} por persona`:""}</div>}
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>setVerIdx(verIdx===i?null:i)} style={{...S.btn("#718096",true),flex:1,marginTop:0,padding:"8px",fontSize:13}}>{verIdx===i?"▲ Ocultar":"👁 Ver detalle"}</button>
                <button onClick={()=>{if(confirm("¿Eliminar este viaje?")) onEliminar(h.id);}} style={{...S.btn("#e53e3e",true),width:"auto",marginTop:0,padding:"8px 14px",fontSize:13}}>🗑</button>

              {verIdx===i&&h.opcionSel&&(
                <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #f4f4f4"}} className="fade-in">
                  {h.opcionSel.dias?.map((dia,di)=>(
                    <div key={di} style={{marginBottom:12}}>
                      <div style={{fontWeight:"bold",color:"#2d3748",fontSize:13,marginBottom:8,background:"#f4f4f4",padding:"6px 10px",borderRadius:8}}>📅 Día {dia.dia}: {dia.titulo}</div>
                      {dia.paradas?.map((p,pi)=>{
                        const t=TIPOS[p.tipo]||TIPOS.turistico;
                        return(<div key={pi} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:"1px solid #f9f9f9",alignItems:"center"}}><span style={{fontSize:14}}>{t.icon}</span><div><span style={{fontSize:13,color:"#2d3748",fontWeight:"bold"}}>{p.nombre}</span>{p.horaLlegada&&<span style={{fontSize:11,color:"#718096"}}> · 🕐{p.horaLlegada}</span>}</div></div>);
                      })}
                    </div>
                  ))}
                  {totalG>0&&(
                    <div style={{marginTop:8,padding:10,background:"#f7fafc",borderRadius:10}}>
                      <div style={{fontWeight:"bold",color:"#2d3748",marginBottom:6}}>💰 Gastos del viaje</div>
                      {Object.entries(CATS).map(([k,c])=>{const t=h.gastos.filter(g=>g.cat===k).reduce((s,g)=>s+g.monto,0);if(!t)return null;return(<div key={k} style={S.row}><span style={{fontSize:13}}>{c.icon} {c.label}</span><span style={{fontWeight:"bold",color:c.color}}>{fmtM(t)}</span></div>);})}
                      <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,fontWeight:"bold"}}><span>Total</span><span style={{color:"#e53e3e",fontSize:16}}>{fmtM(totalG)}</span></div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────
function App(){
  const [tab,       setTab]      = useState("inicio");
  const [apiKey,    setApiKey]   = useState(()=>LS.get("apiKey",""));
  const [viaje,     setViaje]    = useState(()=>LS.get("viaje",null));
  const [estado,    setEstado]   = useState(()=>LS.get("estado","nuevo"));
  const [opciones,  setOpciones] = useState(()=>LS.get("opciones",[]));
  const [opcionSel, setOpcionSel]= useState(()=>LS.get("opcionSel",null));
  const [gastos,    setGastos]   = useState(()=>LS.get("gastos",[]));
  const [pers,      setPers]     = useState(()=>LS.get("pers",2));
  const [historial, setHistorial]= useState(()=>LS.get("historial",[]));
  const [loadingIA, setLoadingIA]= useState(false);
  const [iaError,   setIaError]  = useState("");
  const [modal,     setModal]    = useState(null);
  const [posGPS,    setPosGPS]   = useState(null);
  const [tRest,     setTRest]    = useState("");
  const [pct,       setPct]      = useState(0);
  const [inicioR,   setInicioR]  = useState(()=>{const v=LS.get("inicioR");return v?new Date(v):null;});
  const [fV,setFV] = useState({origen:"",destino:"",ruta:"",auto:"",fRetiro:"",fDevol:"",pers:"2",notas:""});
  const [fG,setFG] = useState({cat:"nafta",desc:"",monto:""});

  // Auto-save
  useEffect(()=>LS.set("viaje",viaje),[viaje]);
  useEffect(()=>LS.set("estado",estado),[estado]);
  useEffect(()=>LS.set("opciones",opciones),[opciones]);
  useEffect(()=>LS.set("opcionSel",opcionSel),[opcionSel]);
  useEffect(()=>LS.set("gastos",gastos),[gastos]);
  useEffect(()=>LS.set("pers",pers),[pers]);
  useEffect(()=>LS.set("historial",historial),[historial]);
  useEffect(()=>{if(inicioR)LS.set("inicioR",inicioR.toISOString());},[inicioR]);

  useEffect(()=>{if(tab==="mapa"&&_map)setTimeout(()=>_map.invalidateSize(),200);},[tab]);

  // Countdown
  useEffect(()=>{
    if(estado!=="viajando"||!viaje) return;
    const calc=()=>{
      const now=new Date(),dev=new Date(viaje.fDevol),ini=inicioR||now;
      const diff=dev-now,total=dev-ini,usado=now-ini;
      setPct(Math.min(100,Math.max(0,Math.round((usado/total)*100))));
      if(diff<=0){setTRest("¡Tiempo vencido!");return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
      setTRest(`${d}d ${h}h ${m}m`);
    };
    calc();
    const iv=setInterval(calc,30000);
    return()=>clearInterval(iv);
  },[estado,viaje,inicioR]);

  const alerta=estado==="viajando"&&viaje&&(()=>{const d=new Date(viaje.fDevol)-new Date();return d>0&&d<3*3600000;})();

  const crearViaje=()=>{
    if(!fV.origen||!fV.destino||!fV.fRetiro||!fV.fDevol) return;
    const v={id:Date.now(),...fV,pers:parseInt(fV.pers)||2};
    setViaje(v); setOpciones([]); setOpcionSel(null); setGastos([]);
    setEstado("planificando"); setInicioR(null); setIaError("");
    LS.del("inicioR");
    setModal(null);
    setFV({origen:"",destino:"",ruta:"",auto:"",fRetiro:"",fDevol:"",pers:"2",notas:""});
    setTab("inicio");
    setTimeout(()=>buscarIA(v),200);
  };

  const buscarIA=async(viajeData)=>{
    const v=viajeData||viaje;
    if(!v||!apiKey){setIaError("Configurá tu API Key de Groq en ⚙️ Config");return;}
    setLoadingIA(true); setOpciones([]); setIaError("");
    const dias=calcDias(v.fRetiro,v.fDevol);
    const salida=fmtHora(v.fRetiro);
    const llegada=fmtHora(v.fDevol);
    const prompt=`Sos un guia turistico experto en Argentina. Tenes que crear un itinerario de viaje MUY DETALLADO hora por hora, como si fueras un guia local que conoce cada ciudad.

DATOS:
Origen: ${v.origen} | Destino: ${v.destino} | Ruta: ${v.ruta||"la mas conveniente"}
Salida: ${salida} | Devolucion: ${llegada} | Duracion: ${dias} dias | Personas: ${v.pers}
${v.notas?"Preferencias: "+v.notas:""}

REGLA PRINCIPAL: Cada actividad, cada lugar para comer, cada atraccion DEBE SER UNA PARADA SEPARADA en el array. NO agrupes multiples actividades en una sola parada.

REGLAS DE PLANIFICACION:
- Velocidad promedio: 80 km/h en rutas argentinas
- Al LLEGAR DE NOCHE (despues de las 19hs): crear paradas nocturnas separadas (plaza iluminada, heladeria, bar tipico, paseo central). La gente no duerme apenas llega.
- SIEMPRE incluir desayuno entre 7:30-9:00 como parada separada tipo "comida"
- Cada atraccion turistica = una parada separada con hora de llegada y salida
- Horarios reales: almuerzo 12:30-14:00, merienda 17:00, cena 20:30-22:00
- Tiempo por atraccion: iglesia/catedral 30-45min, museo 1-2hs, mirador 30-60min, plaza 30min

TIPOS de parada (exactamente estos):
origen, ruta, descanso, comida, turistico, mirador, dormir, destino

EJEMPLO CONCRETO de como deberia verse si llegamos a las 20hs a Catamarca:
DIA 1 paradas:
1. origen - Tucuman 17:00-17:00 - salida
2. ruta - Parada en ruta RN38 19:00-19:20 - combustible y bano
3. dormir - Hotel en Catamarca 20:30-08:00 - CHECK IN. alojamientos:[3 opciones precio]
4. turistico - Plaza 25 de Mayo de noche 21:00-21:45 - paseo nocturno, ver catedral iluminada, fuentes
5. comida - Cena en Catamarca 22:00-23:00 - restaurantes:[3 opciones precio]

DIA 2 paradas:
1. comida - Desayuno en Catamarca 08:00-09:00 - confiteria/cafe. restaurantes:[3 opciones]
2. turistico - Basilica de la Virgen del Valle 09:15-10:00 - la atraccion mas importante de Catamarca, imagen colonial
3. turistico - Catedral Basilica de Catamarca 10:00-10:45 - frente a plaza, arquitectura colonial imponente
4. turistico - Museo Arqueologico Adán Quiroga 11:00-12:00 - ceramica indigena y cultura calchaqui
5. mirador - Cerro El Calvario 12:15-13:45 - subida a pie 20min, vistas panoramicas de Catamarca
6. comida - Almuerzo 14:00-15:30 - restaurantes:[3 opciones tipicos de Catamarca]
7. turistico - Mercado Artesanal 15:45-16:30 - artesanias locales, tejidos, lapislazuli
...continua hasta fin del dia

Genera 3 opciones DISTINTAS (cultural, naturaleza/aventura, gastronomica). Cada una con minimo 6-8 paradas por dia.

JSON requerido (responde SOLO esto, sin texto extra):
{"opciones":[{"nombre":"string","descripcion":"string","totalKm":0,"tiempoTotalManejo":"string","dias":[{"dia":1,"titulo":"string","kmDelDia":0,"paradas":[{"nombre":"string","tipo":"string","descripcion":"string","horaLlegada":"HH:MM","horaSalida":"HH:MM","duracion":"string","kmDesdeAnterior":"string","tiempoManejo":"string","lat":0.0,"lng":0.0,"alojamientos":[],"restaurantes":[]}]}]}]}`;

    // Función para extraer y reparar JSON de la respuesta
    const extraerJSON = (txt) => {
      if(!txt) return null;
      // Limpiar backticks y markdown
      txt = txt.replace(/```json/gi,"").replace(/```/g,"").trim();
      // Extraer desde el primer { hasta el último }
      const start = txt.indexOf("{");
      const end   = txt.lastIndexOf("}");
      if(start < 0 || end < 0 || end <= start) return null;
      txt = txt.slice(start, end + 1);
      // Intento 1: parsear directo
      try { return JSON.parse(txt); } catch(e1) { console.log("JSON parse error:", e1.message.slice(0,80)); }
      // Intento 2: limpiar caracteres de control y parsear
      try {
        const cleaned = txt
          .replace(/[\x00-\x1F\x7F]/g, " ")  // Eliminar caracteres de control
          .replace(/,\s*}/g, "}")               // Coma antes de }
          .replace(/,\s*]/g, "]");              // Coma antes de ]
        return JSON.parse(cleaned);
      } catch(e2) {}
      return null;
    };

    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          max_tokens:8000,
          temperature:0.3,
          response_format:{"type":"json_object"},
          messages:[
            {role:"system",content:"Sos un experto en turismo argentino. Debes responder UNICAMENTE con un objeto JSON valido. Sin texto antes ni despues. Sin markdown. Sin backticks. Solo JSON puro."},
            {role:"user",content:prompt}
          ]
        })
      });
      if(!res.ok){
        const errBody=await res.text();
        let msg="Error HTTP "+res.status;
        try{ msg=JSON.parse(errBody).error?.message||msg; }catch{}
        throw new Error(msg);
      }
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      const rawTxt=data.choices[0].message.content||"";
      console.log("IA respuesta (primeros 200 chars):", rawTxt.slice(0,200));
      const parsed=extraerJSON(rawTxt);
      if(!parsed){ throw new Error("La IA devolvió un formato inesperado. Reintentá — a veces pasa con respuestas muy largas."); }
      if(!parsed.opciones?.length){ throw new Error("La IA no generó opciones. Reintentá con un destino más específico."); }
      setOpciones(parsed.opciones);
      setEstado("listo");
      setTab("opciones");
    }catch(e){
      console.error("IA Error:",e);
      setIaError(e.message||"Error al conectar. Verificá tu API Key de Groq en ⚙️ Config.");
    }
    setLoadingIA(false);
  };

  const iniciarViaje=()=>{
    setInicioR(new Date()); setEstado("viajando");
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(
        pos=>setPosGPS({lat:pos.coords.latitude,lng:pos.coords.longitude}),
        e=>console.log("GPS:",e),{enableHighAccuracy:true,maximumAge:30000}
      );
    }
    setTab("mapa");
  };

  const finalizarViaje=()=>{
    if(!viaje) return;
    const reg={id:Date.now(),fechaFin:new Date().toISOString(),viaje,opciones,opcionSel,gastos,pers};
    setHistorial(prev=>[...prev,reg]);
    setViaje(null); setOpciones([]); setOpcionSel(null); setGastos([]);
    setEstado("nuevo"); setInicioR(null); setIaError("");
    ["viaje","opciones","opcionSel","gastos","estado","inicioR"].forEach(k=>LS.del(k));
    setTab("historial");
  };

  const agregarGasto=()=>{
    if(!fG.monto) return;
    setGastos(p=>[...p,{id:Date.now(),cat:fG.cat,desc:fG.desc,monto:parseFloat(fG.monto),fecha:new Date().toLocaleDateString("es-AR")}]);
    setModal(null); setFG({cat:"nafta",desc:"",monto:""});
  };

  return(
    <div style={S.app}>
      <div style={{display:tab==="mapa"?"block":"none",height:"calc(100vh - 72px)"}}>
        <PantallaMapa viaje={viaje} opcionSel={opcionSel} posGPS={posGPS} estado={estado}/>
      </div>
      {tab==="inicio"    &&<PantallaInicio viaje={viaje} estado={estado} opciones={opciones} loadingIA={loadingIA} iaError={iaError} apiKey={apiKey} tRest={tRest} pct={pct} alerta={alerta} opcionSel={opcionSel} historial={historial} onNuevo={()=>setModal("viaje")} onIniciar={iniciarViaje} onFinalizar={finalizarViaje} setTab={setTab} onReintentar={()=>buscarIA(viaje)}/>}
      {tab==="opciones"  &&<PantallaOpciones opciones={opciones} opcionSel={opcionSel} setOpcionSel={setOpcionSel} loadingIA={loadingIA} iaError={iaError} viaje={viaje} setTab={setTab}/>}
      {tab==="gastos"    &&<PantallaGastos gastos={gastos} setGastos={setGastos} pers={pers} setPers={setPers} setModal={setModal}/>}
      {tab==="historial" &&<PantallaHistorial historial={historial} onEliminar={id=>setHistorial(p=>p.filter(h=>h.id!==id))}/>}
      {tab==="config"    &&<PantallaConfig apiKey={apiKey} setApiKey={setApiKey}/>}

      {modal==="viaje"&&<ModalViaje fV={fV} setFV={setFV} onCrear={crearViaje} onCerrar={()=>setModal(null)}/>}
      {modal==="gasto"&&<ModalGasto fG={fG} setFG={setFG} onAgregar={agregarGasto} onCerrar={()=>setModal(null)}/>}

      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={{...S.nvb(tab===t.id,t.color),position:"relative"}} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
            {t.id==="historial"&&historial.length>0&&<div style={{position:"absolute",top:6,right:"50%",transform:"translateX(10px)",background:"#718096",color:"white",borderRadius:"50%",width:15,height:15,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>{historial.length}</div>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
